<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Snake Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #222;
            font-family: 'Arial', sans-serif;
            color: #fff;
        }
        h1 {
            margin-bottom: 10px;
        }
        canvas {
            border: 5px solid #0f0;
            background-color: #111;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
        #scoreBoard {
            margin-top: 15px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

    <h1>Classic Snake Game</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="scoreBoard">Score: 0</div>

    <script>
        // --- Game Setup ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('scoreBoard');

        const gridSize = 20; // Size of each grid block (20x20 pixels)
        const tileCount = canvas.width / gridSize; // 20x20 grid

        let snake = [
            { x: 10, y: 10 } // Initial snake position (center of the canvas)
        ];
        let food = { x: 15, y: 15 };
        let velocityX = 0;
        let velocityY = 0;
        let score = 0;
        let gameLoopInterval;
        let gameSpeed = 150; // Lower is faster (milliseconds per frame)
        let isGameOver = false;

        // --- Initialization ---

        function initializeGame() {
            snake = [{ x: 10, y: 10 }];
            velocityX = 0;
            velocityY = 0;
            score = 0;
            isGameOver = false;
            scoreBoard.textContent = `Score: 0`;
            placeFood();
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(gameLoop, gameSpeed);
        }

        function placeFood() {
            let newFoodX, newFoodY;
            do {
                // Generate random coordinates within the grid
                newFoodX = Math.floor(Math.random() * tileCount);
                newFoodY = Math.floor(Math.random() * tileCount);
            } while (isFoodOnSnake(newFoodX, newFoodY));
            food = { x: newFoodX, y: newFoodY };
        }

        function isFoodOnSnake(x, y) {
            return snake.some(segment => segment.x === x && segment.y === y);
        }

        // --- Drawing Functions ---

        function drawGame() {
            // 1. Clear the canvas
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Draw the food (Red)
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);

            // 3. Draw the snake
            snake.forEach((segment, index) => {
                // Head color is brighter green
                ctx.fillStyle = index === 0 ? '#0f0' : '#0a0';
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 1, gridSize - 1);
            });
        }

        // --- Game Logic ---

        function moveSnake() {
            // Create the new head position based on current velocity
            const head = { x: snake[0].x + velocityX, y: snake[0].y + velocityY };
            snake.unshift(head); // Add new head to the beginning of the array

            // Check for collision
            if (checkCollision(head)) {
                endGame();
                return;
            }

            // Check if the snake ate the food
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreBoard.textContent = `Score: ${score}`;
                placeFood(); // Generate new food
                // Do NOT pop the tail (snake grows)
            } else {
                snake.pop(); // Remove the tail if food wasn't eaten
            }
        }

        function checkCollision(head) {
            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }

            // Self collision (check if head hits any body segment other than itself)
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        function gameLoop() {
            if (isGameOver) return;

            moveSnake();
            drawGame();
        }

        function endGame() {
            clearInterval(gameLoopInterval);
            isGameOver = true;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'white';
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2 - 20);
            ctx.font = '20px Arial';
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillText('Refresh to Play Again', canvas.width / 2, canvas.height / 2 + 60);
        }

        // --- Input Handling ---

        document.addEventListener('keydown', changeDirection);

        function changeDirection(event) {
            // Prevent snake from instantly reversing direction (e.g., going left immediately after going right)
            const keyPressed = event.key;

            switch (keyPressed) {
                case 'ArrowUp':
                case 'w':
                    if (velocityY === 0) { velocityX = 0; velocityY = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                    if (velocityY === 0) { velocityX = 0; velocityY = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                    if (velocityX === 0) { velocityX = -1; velocityY = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                    if (velocityX === 0) { velocityX = 1; velocityY = 0; }
                    break;
            }
        }

        // --- Start the Game ---
        initializeGame();

    </script>
</body>
</html>
