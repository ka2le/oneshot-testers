<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Snake Game</title>
    <style>
        /* CSS: Styles the game to look nice */
        body {
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        h1 {
            margin-top: 0;
        }

        #gameCanvas {
            background-color: #000; /* Black background for the game board */
            border: 4px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #scoreBoard {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .instructions {
            margin-top: 10px;
            font-size: 14px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <h1>Snake Game</h1>
    <div id="scoreBoard">Score: 0</div>
    
    <!-- The Game Board -->
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <p class="instructions">Use Arrow Keys to Move</p>

    <script>
        // JAVASCRIPT: The game logic

        // 1. Setup the Canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreBoard');

        // 2. Game Settings
        const gridSize = 20; // Size of one square (snake part or apple)
        const tileCount = canvas.width / gridSize; // 20 tiles across and down
        
        let score = 0;
        
        // Snake velocity (movement direction)
        let dx = 0;
        let dy = 0;
        
        // Snake body (array of coordinates)
        let snake = [
            {x: 10, y: 10}, // Head
            {x: 9, y: 10},  // Body
            {x: 8, y: 10}   // Tail
        ];

        // Apple position
        let apple = {x: 15, y: 15};

        // Game Loop speed (milliseconds)
        let gameSpeed = 100; 

        // 3. Input Handling
        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            // Prevent scrolling with arrow keys
            if([37, 38, 39, 40].includes(keyPressed)) {
                event.preventDefault();
            }

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -1; dy = 0;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0; dy = -1;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = 1; dy = 0;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0; dy = 1;
            }
        }

        // 4. Main Game Loop
        function gameLoop() {
            if (didGameEnd()) {
                // Simple Game Over logic: Reset
                alert("Game Over! Your Score: " + score);
                resetGame();
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawApple();
                moveSnake();
                drawSnake();
                
                // Call loop again
                gameLoop();
            }, gameSpeed);
        }

        // 5. Helper Functions
        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            // Draw each part of the snake
            snake.forEach((part, index) => {
                // Head is lighter green, body is darker
                ctx.fillStyle = index === 0 ? "#2ecc71" : "#27ae60";
                ctx.strokeStyle = "#145a32";
                
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }

        function moveSnake() {
            // Create new head based on current velocity
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Add new head to the beginning of snake array
            snake.unshift(head);

            // Check if snake ate the apple
            if (head.x === apple.x && head.y === apple.y) {
                score += 10;
                scoreElement.innerHTML = "Score: " + score;
                generateApple();
            } else {
                // Remove the last part of snake (movement)
                snake.pop();
            }
        }

        function drawApple() {
            ctx.fillStyle = "#e74c3c"; // Red color
            ctx.strokeStyle = "#c0392b";
            ctx.fillRect(apple.x * gridSize, apple.y * gridSize, gridSize, gridSize);
            ctx.strokeRect(apple.x * gridSize, apple.y * gridSize, gridSize, gridSize);
        }

        function generateApple() {
            // Generate random coordinates
            apple.x = Math.floor(Math.random() * tileCount);
            apple.y = Math.floor(Math.random() * tileCount);

            // Check if apple spawned on snake body
            snake.forEach(function isAppleOnSnake(part) {
                if (part.x === apple.x && part.y === apple.y) {
                    generateApple(); // Try again
                }
            });
        }

        function didGameEnd() {
            const head = snake[0];

            // 1. Hit Walls
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }

            // 2. Hit Self (Loop starting from index 4 because head can't hit parts 1,2,3)
            for (let i = 4; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            
            return false;
        }

        function resetGame() {
            snake = [
                {x: 10, y: 10},
                {x: 9, y: 10},
                {x: 8, y: 10}
            ];
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.innerHTML = "Score: 0";
            generateApple();
            // Restart the loop
            gameLoop();
        }

        // Start the game
        gameLoop();

    </script>
</body>
</html>
