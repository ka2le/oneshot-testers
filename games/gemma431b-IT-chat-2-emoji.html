<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Pop! Prototype</title>
    <style>
        :root {
            --good-color: #4caf50;
            --bad-color: #f44336;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            user-select: none; /* Prevent highlighting text while clicking fast */
        }

        /* HUD Layout */
        #game-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .sidebar {
            width: 200px;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        #left-side { border-right: 5px solid var(--good-color); }
        #right-side { border-left: 5px solid var(--bad-color); }

        .sidebar h3 { margin-top: 0; }
        .emoji-list {
            font-size: 2rem;
            text-align: center;
            line-height: 1.5;
        }

        /* Main Play Area */
        #play-zone {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            cursor: crosshair;
        }

        #stats {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            gap: 30px;
            z-index: 5;
            background: rgba(255,255,255,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
        }

        /* The popping emojis */
        .game-emoji {
            position: absolute;
            font-size: 3rem;
            cursor: pointer;
            transition: transform 0.1s;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-emoji:active {
            transform: scale(0.8);
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        /* Game Over Overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }

        #overlay h1 { font-size: 4rem; margin-bottom: 10px; }
        #overlay p { font-size: 1.5rem; margin-bottom: 20px; }
        
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            background: var(--good-color);
            color: white;
            border: none;
            border-radius: 10px;
            transition: background 0.2s;
        }

        button:hover {
            background: #45a049;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Left Side: Good List -->
        <div id="left-side" class="sidebar">
            <h3 style="color: var(--good-color)">GOOD (+1)</h3>
            <div id="good-list" class="emoji-list"></div>
        </div>

        <!-- Center: Play Area -->
        <div id="play-zone">
            <div id="stats">
                <div>Score: <span id="score">0</span></div>
                <div>Hearts: <span id="hearts">❤️❤️❤️</span></div>
            </div>
        </div>

        <!-- Right Side: Bad List -->
        <div id="right-side" class="sidebar">
            <h3 style="color: var(--bad-color)">BAD (-❤️)</h3>
            <div id="bad-list" class="emoji-list"></div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="overlay">
        <h1>GAME OVER</h1>
        <p>Your final score: <span id="final-score">0</span></p>
        <button onclick="startGame()">Play Again</button>
    </div>

    <script>
        const allEmojis = ['🍎', '🍌', '🍇', '🍓', '🍒', '💣', '🌵', '💀', '🕷️', '👻'];
        let goodEmojis = [];
        let badEmojis = [];
        let score = 0;
        let hearts = 3;
        let gameActive = false;
        let spawnTimer;

        const playZone = document.getElementById('play-zone');
        const scoreEl = document.getElementById('score');
        const heartsEl = document.getElementById('hearts');
        const goodListEl = document.getElementById('good-list');
        const badListEl = document.getElementById('bad-list');
        const overlay = document.getElementById('overlay');
        const finalScoreEl = document.getElementById('final-score');

        function startGame() {
            // Reset state
            score = 0;
            hearts = 3;
            gameActive = true;
            overlay.style.display = 'none';
            scoreEl.innerText = score;
            updateHearts();
            
            // Clear previous emojis from screen
            const existingEmojis = document.querySelectorAll('.game-emoji');
            existingEmojis.forEach(e => e.remove());

            // Shuffle emojis and split 5/5
            const shuffled = [...allEmojis].sort(() => Math.random() - 0.5);
            goodEmojis = shuffled.slice(0, 5);
            badEmojis = shuffled.slice(5, 10);

            // Update sidebars
            goodListEl.innerHTML = goodEmojis.join('<br>');
            badListEl.innerHTML = badEmojis.join('<br>');

            // Start spawning
            if(spawnTimer) clearInterval(spawnTimer);
            spawnTimer = setInterval(spawnEmoji, 800); 
        }

        function spawnEmoji() {
            if (!gameActive) return;

            const emojiEl = document.createElement('div');
            emojiEl.classList.add('game-emoji');
            
            // Pick random emoji from the total pool
            const randomEmoji = allEmojis[Math.floor(Math.random() * allEmojis.length)];
            emojiEl.innerText = randomEmoji;

            // Random Position inside the play zone
            const x = Math.random() * (playZone.clientWidth - 60);
            const y = Math.random() * (playZone.clientHeight - 60);
            emojiEl.style.left = x + 'px';
            emojiEl.style.top = y + 'px';

            // Click Logic
            emojiEl.onclick = () => {
                if (goodEmojis.includes(randomEmoji)) {
                    score++;
                    scoreEl.innerText = score;
                } else {
                    hearts--;
                    updateHearts();
                    if (hearts <= 0) gameOver();
                }
                emojiEl.remove();
            };

            playZone.appendChild(emojiEl);

            // Emoji disappears after 1.5 seconds if not clicked
            setTimeout(() => {
                if (emojiEl.parentNode) {
                    emojiEl.remove();
                }
            }, 1500);
        }

        function updateHearts() {
            heartsEl.innerText = '❤️'.repeat(hearts);
        }

        function gameOver() {
            gameActive = false;
            clearInterval(spawnTimer);
            finalScoreEl.innerText = score;
            overlay.style.display = 'flex';
        }

        // Start the game for the first time
        startGame();
    </script>
</body>
</html>
