<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Retro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #22d3ee;
            --snake-head: #818cf8;
            --food-color: #f43f5e;
            --text-color: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(34, 211, 238, 0.2);
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #1e293b;
        }

        canvas {
            display: block;
            background-color: #020617;
        }

        .ui-panel {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--accent-color), var(--snake-head));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.5));
        }

        .score-board {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: opacity 0.3s ease;
        }

        .btn-start {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: var(--accent-color);
            border: none;
            border-radius: 50px;
            color: var(--bg-color);
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
        }

        .btn-start:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--accent-color);
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h1>NEON SNAKE</h1>
        <div class="score-board">Score: <span id="score">0</span> | High Score: <span id="highScore">0</span></div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="overlay">
            <button class="btn-start" onclick="startGame()">Start Game</button>
            <div class="controls-hint">Use Arrow Keys or WASD to Move</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("highScore");
        const overlay = document.getElementById("overlay");

        // Game Settings
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        highScoreElement.innerText = highScore;

        let dx = 0;
        let dy = 0;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let gameSpeed = 100;
        let gameLoopTimeout;
        let changingDirection = false;

        // Initialize Game
        function startGame() {
            overlay.style.opacity = "0";
            setTimeout(() => overlay.style.display = "none", 300);
            
            score = 0;
            scoreElement.innerText = score;
            snake = [{x: 10, y: 10}];
            dx = 1; // Start moving right
            dy = 0;
            createFood();
            main();
        }

        function main() {
            if (didGameEnd()) {
                gameOver();
                return;
            }

            changingDirection = false;
            gameLoopTimeout = setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, gameSpeed);
        }

        function clearCanvas() {
            // Slight trail effect by using a semi-transparent fill instead of clearRect
            ctx.fillStyle = "#020617";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw subtle grid
            ctx.strokeStyle = "#1e293b";
            ctx.lineWidth = 0.5;
            for(let i=0; i<=canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? "#818cf8" : "#22d3ee";
                ctx.shadowBlur = isHead ? 15 : 5;
                ctx.shadowColor = isHead ? "#818cf8" : "#22d3ee";
                
                // Rounded rectangle for snake parts
                ctx.beginPath();
                ctx.roundRect(
                    part.x * gridSize + 2, 
                    part.y * gridSize + 2, 
                    gridSize - 4, 
                    gridSize - 4, 
                    5
                );
                ctx.fill();
                ctx.shadowBlur = 0; // Reset shadow
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                createFood();
                // Increase speed slightly
                if (gameSpeed > 60) gameSpeed -= 1;
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            // Hit walls
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) return true;
            
            // Hit self
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function createFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Prevent food from spawning on snake body
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) createFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#f43f5e";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#f43f5e";
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2, 
                food.y * gridSize + gridSize/2, 
                gridSize/2 - 3, 0, Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScore", highScore);
                highScoreElement.innerText = highScore;
            }
            
            overlay.style.display = "flex";
            overlay.style.opacity = "1";
            document.querySelector(".btn-start").innerText = "Try Again";
            clearTimeout(gameLoopTimeout);
        }

        // Input Handling
        function changeDirection(event) {
            if (changingDirection) return;
            changingDirection = true;

            const keyPressed = event.keyCode;
            const LEFT_KEY = 37, RIGHT_KEY = 39, UP_KEY = 38, DOWN_KEY = 40;
            const A_KEY = 65, D_KEY = 68, W_KEY = 87, S_KEY = 83;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((keyPressed === LEFT_KEY || keyPressed === A_KEY) && !goingRight) { dx = -1; dy = 0; }
            if ((keyPressed === UP_KEY || keyPressed === W_KEY) && !goingDown) { dx = 0; dy = -1; }
            if ((keyPressed === RIGHT_KEY || keyPressed === D_KEY) && !goingLeft) { dx = 1; dy = 0; }
            if ((keyPressed === DOWN_KEY || keyPressed === S_KEY) && !goingUp) { dx = 0; dy = 1; }
        }

        document.addEventListener("keydown", changeDirection);
    </script>
</body>
</html>
