<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Snake Game</title>
    <style>
        /* CSS - Styling the look of the game */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: Arial, sans-serif;
        }

        canvas {
            border: 5px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #000;
        }

        .score-board {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .instructions {
            margin-top: 15px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="score-board">Score: <span id="score">0</span></div>
    <canvas id="snakeGame" width="400" height="400"></canvas>
    <div class="instructions">Use Arrow Keys to Move</div>

    <script>
        // JavaScript - The Game Logic
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let dx = 0; // horizontal velocity
        let dy = 0; // vertical velocity

        // Snake body (array of coordinates)
        let snake = [
            {x: 10, y: 10}, 
            {x: 10, y: 11}, 
            {x: 10, y: 12}
        ];

        // Food position
        let foodX = 5;
        let foodY = 5;

        // Prevent the snake from reversing directly into itself
        let changingDirection = false;

        // Start the game loop
        document.addEventListener("keydown", changeDirection);
        main();

        function main() {
            if (didGame()) {
                alert("Game Over! Your score: " + score);
                document.location.reload();
                return;
            }

            changingDirection = false;
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100); // Speed: 100ms (10 frames per second)
        }

        function didGame() {
            // Hit walls
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }
            // Hit self
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? "#2ecc71" : "#27ae60"; // Head is lighter green
                ctx.strokeStyle = "#2c3e50";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }

        function advanceSnake() {
            // Create new head based on current velocity
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // If no direction is set yet, don't move
            if (dx === 0 && dy === 0) return;

            snake.unshift(head);

            // Check if snake ate food
            if (snake[0].x === foodX && snake[0].y === foodY) {
                score += 10;
                scoreElement.innerHTML = score;
                createFood();
            } else {
                // Remove last part of snake body
                snake.pop();
            }
        }

        function createFood() {
            foodX = Math.floor(Math.random() * tileCount);
            foodY = Math.floor(Math.random() * tileCount);
            
            // Make sure food doesn't spawn on snake body
            snake.forEach(part => {
                if (part.x === foodX && part.y === foodY) createFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize, gridSize);
        }

        function changeDirection(event) {
            if (changingDirection) return;
            changingDirection = true;

            const keyPressed = event.keyCode;
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === LEFT_KEY && !goingRight) { dx = -1; dy = 0; }
            if (keyPressed === UP_KEY && !goingDown) { dx = 0; dy = -1; }
            if (keyPressed === RIGHT_KEY && !goingLeft) { dx = 1; dy = 0; }
            if (keyPressed === DOWN_KEY && !goingUp) { dx = 0; dy = 1; }
        }
    </script>
</body>
</html>
