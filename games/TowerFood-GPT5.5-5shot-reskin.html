<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meadow Guardians - Garden Defence</title>
  <style>
    :root {
      --bg:#f4fbf6; --panel:#ffffff; --panel2:#edf8f0; --text:#24362c; --muted:#6f8576;
      --accent:#8fce9b; --accent2:#8abfdd; --good:#6dc486; --bad:#ef8080;
      --line:#d9eadd; --shadow:rgba(70,105,78,.16);
    }
    * { box-sizing:border-box; }
    body {
      margin:0; background:
        radial-gradient(circle at 18% 0%, rgba(207,238,216,.95) 0%, rgba(246,252,247,.92) 30%, transparent 58%),
        linear-gradient(180deg, #f7fcf8 0%, #eaf7ef 52%, #dcefe4 100%);
      color:var(--text); font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; overflow:hidden;
    }
    button { font:inherit; color:inherit; border:0; cursor:pointer; }
    button:disabled { cursor:not-allowed; opacity:.48; filter:saturate(.65); }
    .app { height:100vh; display:grid; grid-template-rows:auto 1fr auto; }
    .topbar {
      display:grid; grid-template-columns:minmax(300px, 1fr) minmax(560px, 1.45fr) minmax(280px, .85fr); gap:10px;
      padding:10px; background:rgba(255,255,255,.86); backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(142,190,151,.32); box-shadow:0 8px 26px var(--shadow); z-index:3;
    }
    .brand { display:flex; align-items:center; gap:12px; min-width:0; }
    .logo {
      width:48px; height:48px; display:grid; place-items:center; border-radius:18px;
      background:linear-gradient(145deg, #ddf4e2, #b7e5c1);
      box-shadow:0 7px 18px rgba(107,165,119,.22), inset 0 2px 8px rgba(255,255,255,.7);
      font-size:28px;
    }
    h1 { margin:0; font-size:20px; line-height:1.05; letter-spacing:.2px; }
    .subtitle { margin-top:4px; color:var(--muted); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .stats { display:flex; flex-wrap:wrap; gap:8px; align-content:center; }
    .stat {
      min-width:86px; padding:7px 9px; border-radius:14px; background:rgba(255,255,255,.68);
      border:1px solid rgba(132,178,143,.18); box-shadow:inset 0 1px 0 rgba(255,255,255,.9), 0 5px 12px rgba(85,124,94,.08);
    }
    .stat.wide { min-width:150px; }
    .stat b { display:block; color:#203329; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .stat span { display:block; color:var(--muted); font-size:11px; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .actions { display:flex; flex-wrap:wrap; gap:8px; align-content:center; justify-content:flex-end; }
    .primary, .secondary, .danger, .tiny {
      border-radius:13px; padding:9px 12px; background:linear-gradient(180deg, #a8dfb0, #78c88a);
      color:#173021; font-weight:800; box-shadow:0 5px 14px rgba(104,174,123,.22), inset 0 1px 0 rgba(255,255,255,.7);
    }
    .secondary {
      background:linear-gradient(180deg, #ffffff, #eef8f1); color:var(--text);
      border:1px solid rgba(132,178,143,.2); font-weight:700; box-shadow:0 4px 12px rgba(85,124,94,.08), inset 0 1px 0 rgba(255,255,255,.9);
    }
    .danger { background:linear-gradient(180deg, #ffd6d6, #f0a5a5); color:#562a2a; }
    .tiny { padding:5px 8px; border-radius:10px; font-size:12px; white-space:nowrap; }
    .gameShell { min-height:0; display:grid; grid-template-columns:1fr 370px; gap:10px; padding:10px; }
    .boardWrap {
      min-width:0; min-height:0; position:relative; border-radius:24px; overflow:hidden;
      border:1px solid rgba(133,185,145,.38); background:#eaf7ef; box-shadow:0 16px 34px rgba(72,109,82,.18);
    }
    canvas { width:100%; height:100%; display:block; background:#eaf7ef; }
    .boardSell {
      position:absolute; z-index:12; display:none; min-width:118px; padding:7px 10px; border-radius:999px;
      background:linear-gradient(180deg, #ffffff, #d7f0dc); color:#1e3a28; font-size:12px; font-weight:900;
      border:1px solid rgba(118,173,131,.45); box-shadow:0 8px 18px rgba(76,119,86,.18);
      transform:translate(-50%, 0);
    }
    .boardSell.show { display:block; }
    .boardTargets {
      position:absolute; z-index:13; display:none; gap:5px; padding:5px; border-radius:999px;
      background:rgba(255,255,255,.84); border:1px solid rgba(118,173,131,.28); box-shadow:0 8px 18px rgba(76,119,86,.18);
      transform:translate(-50%, 0); backdrop-filter:blur(12px);
    }
    .boardTargets.show { display:flex; }
    .targetBtn {
      width:31px; height:31px; display:grid; place-items:center; border-radius:50%;
      background:rgba(233,247,236,.88); border:1px solid rgba(118,173,131,.2); font-size:16px;
    }
    .targetBtn.active {
      background:linear-gradient(180deg, #d9f3df, #a8dfb0); color:#173021;
      box-shadow:0 0 0 2px rgba(143,206,155,.22);
    }
    .floatMsg {
      position:absolute; left:14px; bottom:14px; max-width:520px; padding:9px 12px; border-radius:14px;
      background:rgba(255,255,255,.86); border:1px solid rgba(118,173,131,.26); color:var(--text);
      font-size:13px; pointer-events:none; opacity:0; transform:translateY(8px); transition:.2s ease; box-shadow:0 8px 20px rgba(76,119,86,.14);
    }
    .floatMsg.show { opacity:1; transform:translateY(0); }
    .toast {
      position:absolute; top:84px; left:50%; transform:translateX(-50%); padding:10px 14px; border-radius:14px;
      background:rgba(255,255,255,.92); border:1px solid rgba(118,173,131,.28); box-shadow:0 10px 28px rgba(76,119,86,.18);
      color:#24362c; font-weight:800; z-index:10; opacity:0; pointer-events:none; transition:.2s ease; backdrop-filter:blur(12px);
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(6px); }
    .sidebar { min-width:0; min-height:0; overflow:hidden; display:flex; flex-direction:column; gap:10px; }
    .panel {
      background:rgba(255,255,255,.82); backdrop-filter:blur(14px);
      border:1px solid rgba(132,178,143,.2); border-radius:20px; box-shadow:0 10px 24px var(--shadow), inset 0 1px 0 rgba(255,255,255,.9);
      overflow:hidden;
    }
    .towerPanel { flex:1; min-height:0; display:flex; flex-direction:column; }
    .panelHeader {
      padding:11px 12px; border-bottom:1px solid rgba(132,178,143,.16);
      display:flex; justify-content:space-between; align-items:center; gap:10px; flex:0 0 auto;
    }
    .panelHeader h2 { margin:0; font-size:15px; letter-spacing:.2px; }
    .panelBody { padding:12px; }
    .towerPanel .panelBody { min-height:0; overflow:auto; }
    .towerList { display:grid; gap:8px; }
    .towerCard {
      border-radius:16px; background:rgba(255,255,255,.66); border:1px solid rgba(132,178,143,.18);
      transition:.15s ease; overflow:hidden;
    }
    .towerCard.selected { outline:2px solid var(--accent); background:rgba(233,248,236,.9); }
    .towerHeader {
      width:100%; display:grid; grid-template-columns:40px 1fr auto; gap:9px; align-items:center; padding:8px;
      background:transparent; text-align:left;
    }
    .towerIcon {
      width:40px; height:40px; display:grid; place-items:center; border-radius:14px;
      background:linear-gradient(180deg, rgba(244,252,246,.95), rgba(221,243,226,.95)); font-size:24px; border:1px solid rgba(132,178,143,.2);
    }
    .towerHeader h3 { margin:0; font-size:13px; }
    .towerHeader p { margin:2px 0 0; color:var(--muted); font-size:10.5px; line-height:1.25; }
    .price { font-weight:900; color:#3f7b51; white-space:nowrap; font-size:12px; }
    .towerDetails {
      display:none; padding:9px; border-top:1px solid rgba(132,178,143,.16); background:rgba(234,247,239,.54);
    }
    .towerCard.selected .towerDetails { display:grid; gap:8px; }
    .detailGrid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .detailPill {
      padding:6px 7px; border-radius:10px; background:rgba(255,255,255,.66); color:var(--muted); font-size:11px;
      border:1px solid rgba(132,178,143,.16);
    }
    .detailPill b { display:block; color:var(--text); font-size:12px; margin-top:1px; }
    .upgradeRow {
      display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; padding:8px; border-radius:12px;
      background:rgba(255,255,255,.66); border:1px solid rgba(132,178,143,.16);
    }
    .upgradeRow b { font-size:12px; }
    .upgradeRow span { display:block; color:var(--muted); font-size:10.5px; margin-top:2px; line-height:1.25; }
    .help { color:var(--muted); font-size:12px; line-height:1.45; }
    .footer {
      padding:8px 12px; color:#708574; font-size:12px; display:flex; justify-content:space-between; gap:12px;
      background:rgba(255,255,255,.72); border-top:1px solid rgba(132,178,143,.18);
    }
    @media (max-width: 980px) {
      body { overflow:auto; }
      .app { height:auto; min-height:100vh; }
      .topbar { grid-template-columns:1fr; }
      .actions { justify-content:flex-start; }
      .gameShell { grid-template-columns:1fr; }
      .boardWrap { height:62vh; min-height:430px; }
      .sidebar { overflow:visible; }
      .towerPanel .panelBody { overflow:visible; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🐾</div>
        <div>
          <h1>Meadow Guardians</h1>
          <div class="subtitle">A soft garden defence with flowers, critters, and calm meadow energy.</div>
        </div>
      </div>
      <div class="stats" id="stats"></div>
      <div class="actions">
        <button class="primary" id="startWaveBtn">Start Stroll</button>
        <button class="secondary" id="speedBtn">Speed: 1x</button>
        <button class="secondary" id="pauseBtn">Pause</button>
        <button class="danger" id="restartBtn">Restart</button>
      </div>
    </header>

    <main class="gameShell">
      <section class="boardWrap" id="boardWrap">
        <canvas id="game" width="1180" height="680"></canvas>
        <div class="boardTargets" id="boardTargets">
          <button class="targetBtn" data-target-mode="first" title="Guide first">⏩</button>
          <button class="targetBtn" data-target-mode="last" title="Guide last">⏪</button>
          <button class="targetBtn" data-target-mode="hp" title="Guide strongest">❤️</button>
        </div>
        <button class="boardSell" id="boardSellBtn">Sell</button>
        <div class="floatMsg" id="floatMsg"></div>
        <div class="toast" id="toast"></div>
      </section>

      <aside class="sidebar">
        <section class="panel towerPanel">
          <div class="panelHeader"><h2>Flowers</h2><span class="help">Select → plant / nurture</span></div>
          <div class="panelBody">
            <div class="towerList" id="towerList"></div>
          </div>
        </section>
      </aside>
    </main>

    <footer class="footer">
      <span>Selected flowers can guide first, last, or strongest critters using the icons above the flower.</span>
      <span>Shell turtles alternate: 🐢 strolling, 🐚 tucked safely away.</span>
    </footer>
  </div>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const statsEl = document.getElementById("stats");
      const towerListEl = document.getElementById("towerList");
      const floatMsgEl = document.getElementById("floatMsg");
      const toastEl = document.getElementById("toast");
      const startWaveBtn = document.getElementById("startWaveBtn");
      const speedBtn = document.getElementById("speedBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const restartBtn = document.getElementById("restartBtn");
      const boardSellBtn = document.getElementById("boardSellBtn");
      const boardTargetsEl = document.getElementById("boardTargets");

      const W = canvas.width, H = canvas.height;
      const TWO_PI = Math.PI * 2;
      const MAX_UPGRADE_LEVEL = 5;
      const blockedRadius = 46;
      const path = [{x:-34,y:358}, {x:155,y:358}, {x:155,y:130}, {x:365,y:130}, {x:365,y:520}, {x:635,y:520}, {x:635,y:220}, {x:892,y:220}, {x:892,y:430}, {x:1215,y:430}];

      const targetModes = {
        first: { icon:"⏩", name:"First" },
        last: { icon:"⏪", name:"Last" },
        hp: { icon:"💗", name:"Strongest" }
      };

      const enemyTypes = {
        normal: { key:"normal", name:"Bunny", emoji:"🐰", hp:1, speed:1, reward:1, size:34, lifeCost:1, priority:0, color:"#8fd89d" },
        runner: { key:"runner", name:"Squirrel", emoji:"🐿️", hp:.46, speed:2.95, reward:1.18, size:28, lifeCost:1, priority:28, color:"#92c7df" },
        tank: { key:"tank", name:"Turtle", emoji:"🐢", hp:4.75, speed:.55, reward:2.05, size:44, lifeCost:2, priority:62, color:"#89b879" },
        swarm: { key:"swarm", name:"Duckling", emoji:"🐥", hp:.32, speed:1.42, reward:.44, size:25, lifeCost:1, priority:-14, color:"#f0d97a" },
        healer: { key:"healer", name:"Gentle Deer", emoji:"🦌", hp:1.45, speed:.86, reward:1.8, size:36, lifeCost:1, priority:80, color:"#8fd89d" },
        shielder: { key:"shielder", name:"Shell Turtle", emoji:"🐢", hp:1.9, speed:.92, reward:1.75, size:36, lifeCost:1, priority:75, color:"#8abfdd" },
        candy: { key:"candy", name:"Butterfly", emoji:"🦋", hp:.82, speed:1.55, reward:2.4, size:31, lifeCost:2, priority:120, color:"#c9a9ee" },
        boss: { key:"boss", name:"Panda", emoji:"🐼", hp:8.25, speed:.55, reward:6.2, size:51, lifeCost:4, priority:150, color:"#ef8080" }
      };

      const towerTypes = {
        arrow: { key:"arrow", name:"Daisy Bloom", emoji:"🌼", cost:70, range:145, damage:22, fireRate:1.72, splash:0, auraDps:0, color:"#f2d66b", family:"single" },
        dynamite: { key:"dynamite", name:"Poppy Puff", emoji:"🌺", cost:125, range:126, damage:25, fireRate:.52, splash:58, auraDps:0, color:"#ee9aaa", family:"aoe" },
        rad: { key:"rad", name:"Lavender Mist", emoji:"🪻", cost:110, range:103, damage:0, fireRate:0, splash:0, auraDps:12, color:"#b79ee8", family:"aura" },
        sun: { key:"sun", name:"Sunflower Ray", emoji:"🌻", cost:700, range:166, damage:154, fireRate:1.48, splash:0, auraDps:0, color:"#f5cf63", family:"single" },
        bomb: { key:"bomb", name:"Lotus Bloom", emoji:"🪷", cost:1200, range:142, damage:175, fireRate:.36, splash:82, auraDps:0, color:"#dfa7d8", family:"aoe" },
        bio: { key:"bio", name:"Moonflower Aura", emoji:"🌸", cost:1050, range:123, damage:0, fireRate:0, splash:0, auraDps:84, color:"#f4aeca", family:"aura" }
      };

      const upgradeDefs = {
        damage: { name:"Petals", label:"Power", baseCost:55, scale:1.74 },
        range: { name:"Roots", label:"Range", baseCost:45, scale:1.68 },
        speed: { name:"Rhythm", label:"Bloom Speed", baseCost:50, scale:1.72 }
      };

      let state, statMods, lastT = performance.now(), raf = 0;
      let selectedBuildType = null;
      let selectedTowerId = null;
      let mouse = { x:0, y:0, inside:false };

      function freshMods() {
        return Object.fromEntries(Object.keys(towerTypes).map(k => [k, { damage:1, range:1, fireRate:1, auraDps:1, levels:{damage:0, range:0, speed:0} }]));
      }

      function reset() {
        statMods = freshMods();
        state = {
          cash:165, lives:16, wave:0, waveName:wavePlan(1).name, score:0, paused:false, gameOver:false, victory:false,
          speedIndex:0, speedOptions:[1,1.5,2.5], towers:[], enemies:[], projectiles:[], particles:[],
          spawnQueue:[], waveActive:false, spawnTimer:0, nextId:1
        };
        selectedBuildType = null;
        selectedTowerId = null;
        lastT = performance.now();
        renderAll();
        toast("Plant before stroll 1");
      }

      function statFor(type, field) {
        const base = towerTypes[type], mods = statMods[type];
        if (field === "damage") return base.damage * mods.damage;
        if (field === "range") return base.range * mods.range;
        if (field === "fireRate") return base.fireRate * mods.fireRate;
        if (field === "auraDps") return base.auraDps * mods.auraDps;
        return base[field];
      }

      function upgradeCost(type, attr) {
        const tower = towerTypes[type], lvl = statMods[type].levels[attr];
        const premiumPenalty = tower.cost >= 700 ? .78 : 1;
        return Math.round(upgradeDefs[attr].baseCost * (tower.cost / 80) * premiumPenalty * Math.pow(upgradeDefs[attr].scale, lvl));
      }

      function upgradePreview(type, attr) {
        const tower = towerTypes[type];
        if (attr === "damage") return tower.family === "aura" ? `Aura ${fmt(statFor(type,"auraDps"))}/s` : `Damage ${fmt(statFor(type,"damage"))}`;
        if (attr === "range") return `Range ${fmt(statFor(type,"range"))}`;
        if (attr === "speed") return tower.family === "aura" ? `Aura ${fmt(statFor(type,"auraDps"))}/s` : `Rate ${fmt(statFor(type,"fireRate"))}/s`;
      }

      function sellValue(tower) { return Math.floor(towerTypes[tower.type].cost * .5); }
      function fmt(n) { return Math.round(n * 10) / 10; }
      function clamp(v,min,max) { return Math.max(min, Math.min(max, v)); }
      function lerp(a,b,t) { return a + (b-a)*t; }

      function wavePlan(num) {
        const enemies = [];
        let cursor = 0;

        const add = (kind, count, spacing, firstDelay=.38) => {
          for (let i = 0; i < count; i++) enemies.push(makeEnemy(kind, num, cursor++, i === 0 ? firstDelay : spacing));
        };
        const burst = (kind, packs, packSize, intra=.07, gap=.48) => {
          for (let p = 0; p < packs; p++) for (let i = 0; i < packSize; i++) enemies.push(makeEnemy(kind, num, cursor++, i === 0 ? gap : intra));
        };

        if (num % 9 === 0) {
          add("candy", 3 + Math.floor(num / 3), .72, .42);
          return { name:"Butterfly Drift", enemies };
        }

        const base = 8 + Math.floor(num * 2.22);
        const style = num === 1 ? "starter" : num % 8;
        let name = "Mixed Meadow";

        if (style === "starter") {
          name = "Gentle First Stroll";
          add("normal", 10, .56, .32);
          burst("swarm", 1, 7, .09, .75);
        } else if (style === 2) {
          name = "Duckling Cluster";
          add("normal", Math.floor(base * .34), .5, .32);
          burst("swarm", 4 + Math.floor(num / 5), 8 + Math.floor(num / 7), .065, .46);
          if (num >= 10) add("healer", 1 + Math.floor(num / 10), .95, .55);
        } else if (style === 3) {
          name = "Squirrel Scamper";
          add("runner", 10 + Math.floor(num * 1.05), .245, .32);
          burst("swarm", 2, 7, .07, .48);
        } else if (style === 4) {
          name = "Turtle Stroll";
          add("tank", 4 + Math.floor(num * .5), .78, .35);
          add("normal", Math.floor(base * .45), .43, .4);
          if (num >= 8) add("healer", 1 + Math.floor(num / 8), .9, .55);
        } else if (style === 5) {
          name = "Shell Turtle Pause";
          add("shielder", 5 + Math.floor(num * .45), .54, .36);
          add("runner", 4 + Math.floor(num / 2), .255, .5);
          if (num >= 13) add("tank", 2 + Math.floor(num / 7), .78, .65);
        } else if (style === 6) {
          name = "Deer Meadow Care";
          add("healer", 3 + Math.floor(num / 4), .7, .34);
          add("normal", Math.floor(base * .58), .39, .42);
          burst("swarm", 3 + Math.floor(num / 7), 7, .07, .5);
        } else if (style === 7) {
          name = "Split Garden Trail";
          add("runner", 7 + Math.floor(num / 2), .255, .3);
          add("tank", 3 + Math.floor(num / 5), .72, .58);
          add("shielder", 3 + Math.floor(num / 6), .52, .65);
          burst("swarm", 3 + Math.floor(num / 7), 7, .07, .5);
        } else {
          name = "Full Meadow Visit";
          add("normal", Math.floor(base * .4), .4, .3);
          add("runner", 6 + Math.floor(num / 2.3), .25, .45);
          add("tank", 2 + Math.floor(num / 5), .72, .58);
          add("healer", 1 + Math.floor(num / 6), .8, .62);
          add("shielder", 2 + Math.floor(num / 6), .5, .7);
          burst("swarm", 3 + Math.floor(num / 7), 7, .07, .5);
        }

        if (num % 5 === 0) {
          name = "Panda Picnic";
          add("boss", 1 + Math.floor(num / 15), 1.05, .75);
          add("tank", 2 + Math.floor(num / 6), .7, .58);
          add("healer", 1 + Math.floor(num / 10), .82, .62);
          add("shielder", 2 + Math.floor(num / 8), .52, .68);
        }

        return { name, enemies };
      }

      function makeEnemy(kind, wave, index, delay) {
        const type = enemyTypes[kind] || enemyTypes.normal;
        const late = Math.max(0, wave - 8);
        const hpBase = 36 * Math.pow(1.235, wave - 1) + wave * 8.5 + late * late * .55;
        const speedBase = 56 + Math.min(78, wave * 3.35);
        const rewardBase = 10 + Math.max(0, wave - 7) * .44 + Math.max(0, wave - 14) * .55;
        return {
          kind, label:type.name, emoji:type.emoji,
          hp:Math.round(hpBase * type.hp),
          speed:speedBase * type.speed,
          reward:Math.max(3, Math.round(rewardBase * type.reward)),
          lifeCost:type.lifeCost,
          healDps:kind === "healer" ? 4 + wave * 1.05 + Math.max(0, wave - 12) * .9 : 0,
          direct:kind === "candy",
          delay
        };
      }

      function startWave() {
        if (state.gameOver || state.waveActive) return;
        const plan = wavePlan(state.wave + 1);
        state.wave++;
        state.waveName = plan.name;
        state.waveActive = true;
        state.spawnQueue = plan.enemies;
        state.spawnTimer = 0;
        startWaveBtn.disabled = true;
        renderAll();
        toast(`Stroll ${state.wave}: ${plan.name}`);
      }

      function spawnEnemy(spec) {
        const p = spec.direct ? {x:-42,y:86} : path[0];
        const end = {x:W+42,y:430};
        const directDistance = Math.hypot(end.x - p.x, end.y - p.y);
        state.enemies.push({
          id:state.nextId++, x:p.x, y:p.y, baseY:p.y, hp:spec.hp, maxHp:spec.hp, speed:spec.speed, reward:spec.reward,
          emoji:spec.emoji, kind:spec.kind, label:spec.label, lifeCost:spec.lifeCost, healDps:spec.healDps,
          seg:0, progress:0, slow:0, burn:0, burnDps:0, burnSource:0, age:0, reached:false,
          direct:spec.direct, directStart:p, directEnd:end, directProgress:0, directDistance
        });
      }

      function isInvulnerable(enemy) {
        return enemy.kind === "shielder" && Math.floor(enemy.age / 2) % 2 === 1;
      }

      function shieldEmoji(enemy) {
        return isInvulnerable(enemy) ? "🐚" : "🐢";
      }

      function travelScore(enemy) {
        return enemy.direct ? 2500 + enemy.directProgress * 2500 : enemy.seg * 1000 + enemy.progress * 1000;
      }

      function renderStats() {
        statsEl.innerHTML = [
          ["💧", state.cash, "Dew drops", ""],
          ["❤️", state.lives, "Cozy hearts", ""],
          ["🍃", state.wave || 1, state.waveActive ? "Current stroll" : "Next stroll", ""],
          ["🌿", state.waveName || "Gentle First Stroll", state.waveActive ? "Now visiting" : "Stroll style", "wide"],
          ["🌟", state.score, "Harmony", ""],
          ["🌷", state.towers.length, "Flowers", ""]
        ].map(([icon,val,label,klass]) => `<div class="stat ${klass}"><b>${icon} ${val}</b><span>${label}</span></div>`).join("");
        speedBtn.textContent = `Speed: ${state.speedOptions[state.speedIndex]}x`;
        pauseBtn.textContent = state.paused ? "Resume" : "Pause";
        startWaveBtn.disabled = state.waveActive || state.gameOver;
      }

      function renderTowerList() {
        const activeTower = state.towers.find(t => t.id === selectedTowerId);
        towerListEl.innerHTML = Object.values(towerTypes).map(t => {
          const selected = selectedBuildType === t.key || (!selectedBuildType && activeTower && activeTower.type === t.key);
          const role = t.family === "aura" ? `Aura ${fmt(statFor(t.key,"auraDps"))}/s` : t.splash ? `AOE ${fmt(statFor(t.key,"damage"))} · ${fmt(statFor(t.key,"fireRate"))}/s` : `Shot ${fmt(statFor(t.key,"damage"))} · ${fmt(statFor(t.key,"fireRate"))}/s`;
          const selectedInfo = activeTower && activeTower.type === t.key ? `<div class="detailPill">Target<b>${targetModes[activeTower.targetMode || "first"].icon} ${targetModes[activeTower.targetMode || "first"].name}</b></div>` : "";
          return `
            <div class="towerCard ${selected ? "selected" : ""}">
              <button class="towerHeader" data-build="${t.key}">
                <div class="towerIcon">${t.emoji}</div>
                <div><h3>${t.name}</h3><p>${role} · R ${fmt(statFor(t.key,"range"))}</p></div>
                <div class="price">💧${t.cost}</div>
              </button>
              <div class="towerDetails">
                <div class="detailGrid">
                  <div class="detailPill">${t.family === "aura" ? "Aura DPS" : "Damage"}<b>${fmt(t.family === "aura" ? statFor(t.key,"auraDps") : statFor(t.key,"damage"))}</b></div>
                  <div class="detailPill">Range<b>${fmt(statFor(t.key,"range"))}</b></div>
                  <div class="detailPill">${t.family === "aura" ? "Tick type" : "Bloom rate"}<b>${t.family === "aura" ? "Aura" : `${fmt(statFor(t.key,"fireRate"))}/s`}</b></div>
                  ${selectedInfo || `<div class="detailPill">Mode<b>${selectedBuildType === t.key ? "Plant" : "Nurture"}</b></div>`}
                </div>
                ${renderUpgradeRows(t.key)}
              </div>
            </div>
          `;
        }).join("");
        towerListEl.querySelectorAll("[data-build]").forEach(btn => btn.addEventListener("click", () => {
          selectedBuildType = btn.dataset.build;
          selectedTowerId = null;
          renderAll();
          floatMsg(`${towerTypes[selectedBuildType].name} selected.`);
        }));
        towerListEl.querySelectorAll("[data-upgrade]").forEach(btn => btn.addEventListener("click", e => {
          e.stopPropagation();
          buyUpgrade(btn.dataset.type, btn.dataset.upgrade);
        }));
      }

      function renderUpgradeRows(type) {
        return Object.entries(upgradeDefs).map(([attr, def]) => {
          const lvl = statMods[type].levels[attr], maxed = lvl >= MAX_UPGRADE_LEVEL, cost = upgradeCost(type, attr);
          const disabled = state.cash < cost || maxed;
          return `
            <div class="upgradeRow">
              <div><b>${def.name} Lv.${lvl}/${MAX_UPGRADE_LEVEL}</b><span>${upgradePreview(type, attr)}</span></div>
              <button class="tiny" data-type="${type}" data-upgrade="${attr}" ${disabled ? "disabled" : ""}>${maxed ? "Max" : `💧${cost}`}</button>
            </div>
          `;
        }).join("");
      }

      function renderBoardControls() {
        const tower = state.towers.find(t => t.id === selectedTowerId);
        if (!tower) {
          boardSellBtn.classList.remove("show");
          boardTargetsEl.classList.remove("show");
          return;
        }

        const topPct = tower.y / H * 100;
        boardSellBtn.textContent = `Clear +💧${sellValue(tower)}`;
        boardSellBtn.style.left = `${tower.x / W * 100}%`;
        boardSellBtn.style.top = `${topPct}%`;
        boardSellBtn.style.transform = topPct > 86 ? "translate(-50%, -64px)" : "translate(-50%, 34px)";
        boardSellBtn.classList.add("show");

        boardTargetsEl.style.left = `${tower.x / W * 100}%`;
        boardTargetsEl.style.top = `${topPct}%`;
        boardTargetsEl.style.transform = topPct < 12 ? "translate(-50%, 42px)" : "translate(-50%, -52px)";
        boardTargetsEl.classList.add("show");
        boardTargetsEl.querySelectorAll("[data-target-mode]").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.targetMode === (tower.targetMode || "first"));
        });
      }

      function renderAll() {
        renderStats();
        renderTowerList();
        renderBoardControls();
      }

      function buyUpgrade(type, attr) {
        const cost = upgradeCost(type, attr), mods = statMods[type];
        if (mods.levels[attr] >= MAX_UPGRADE_LEVEL || state.cash < cost) return;
        state.cash -= cost;
        mods.levels[attr]++;
        if (attr === "damage") {
          if (towerTypes[type].family === "aura") mods.auraDps *= 1.22;
          else mods.damage *= 1.22;
        }
        if (attr === "range") mods.range *= 1.12;
        if (attr === "speed") {
          if (towerTypes[type].family === "aura") mods.auraDps *= 1.14;
          else mods.fireRate *= 1.18;
        }
        toast(`${towerTypes[type].name}: ${upgradeDefs[attr].label} Lv.${mods.levels[attr]}`);
        renderAll();
      }

      function sellSelected() {
        const idx = state.towers.findIndex(t => t.id === selectedTowerId);
        if (idx < 0) return;
        const tower = state.towers[idx];
        state.cash += sellValue(tower);
        state.towers.splice(idx,1);
        selectedTowerId = null;
        toast(`Returned to meadow +💧${sellValue(tower)}`);
        renderAll();
      }

      function toast(text) {
        toastEl.textContent = text;
        toastEl.classList.add("show");
        clearTimeout(toast._t);
        toast._t = setTimeout(() => toastEl.classList.remove("show"), 1250);
      }

      function floatMsg(text) {
        floatMsgEl.textContent = text;
        floatMsgEl.classList.add("show");
        clearTimeout(floatMsg._t);
        floatMsg._t = setTimeout(() => floatMsgEl.classList.remove("show"), 2000);
      }

      function getMouse(evt) {
        const rect = canvas.getBoundingClientRect();
        return { x:(evt.clientX - rect.left) * W / rect.width, y:(evt.clientY - rect.top) * H / rect.height };
      }

      function pointToSegment(p,a,b) {
        const dx=b.x-a.x, dy=b.y-a.y, len2=dx*dx+dy*dy;
        if (!len2) return Math.hypot(p.x-a.x,p.y-a.y);
        const t=clamp(((p.x-a.x)*dx+(p.y-a.y)*dy)/len2,0,1);
        return Math.hypot(p.x-(a.x+dx*t), p.y-(a.y+dy*t));
      }

      function nearPath(x,y) {
        let best = Infinity;
        for (let i = 0; i < path.length - 1; i++) best = Math.min(best, pointToSegment({x,y}, path[i], path[i+1]));
        return best;
      }

      function canBuildAt(x,y) {
        if (x < 34 || y < 34 || x > W - 34 || y > H - 34) return { ok:false, reason:"Too close to the meadow edge." };
        if (nearPath(x,y) < blockedRadius) return { ok:false, reason:"Critters need that trail." };
        for (const t of state.towers) if (Math.hypot(t.x-x, t.y-y) < 54) return { ok:false, reason:"Too close to another flower." };
        return { ok:true, reason:"" };
      }

      function buildTower(x,y) {
        if (!selectedBuildType) { selectedTowerId = null; renderAll(); return; }
        const type = towerTypes[selectedBuildType], valid = canBuildAt(x,y);
        if (!valid.ok) { floatMsg(valid.reason); return; }
        if (state.cash < type.cost) { floatMsg(`Need 💧${type.cost - state.cash} more.`); return; }
        state.cash -= type.cost;
        const tower = { id:state.nextId++, type:selectedBuildType, x, y, cooldown:0, angle:0, kills:0, pulse:0, targetMode:"first" };
        state.towers.push(tower);
        selectedTowerId = tower.id;
        selectedBuildType = null;
        renderAll();
      }

      function selectTowerAt(x,y) {
        let best = null, bestD = 999;
        for (const t of state.towers) {
          const d = Math.hypot(t.x-x,t.y-y);
          if (d < 28 && d < bestD) { best = t; bestD = d; }
        }
        if (best) {
          selectedTowerId = best.id;
          selectedBuildType = null;
          renderAll();
          return true;
        }
        return false;
      }

      canvas.addEventListener("mousemove", e => { mouse = { ...getMouse(e), inside:true }; });
      canvas.addEventListener("mouseleave", () => { mouse.inside = false; });
      canvas.addEventListener("click", e => {
        if (state.gameOver) return;
        const m = getMouse(e);
        if (!selectTowerAt(m.x,m.y)) buildTower(m.x,m.y);
      });
      boardSellBtn.addEventListener("click", e => {
        e.stopPropagation();
        sellSelected();
      });
      boardTargetsEl.addEventListener("click", e => {
        const btn = e.target.closest("[data-target-mode]");
        if (!btn) return;
        e.stopPropagation();
        const tower = state.towers.find(t => t.id === selectedTowerId);
        if (!tower) return;
        tower.targetMode = btn.dataset.targetMode;
        toast(`${towerTypes[tower.type].name}: ${targetModes[tower.targetMode].name}`);
        renderAll();
      });
      window.addEventListener("keydown", e => {
        if (e.key === "Escape") {
          selectedTowerId = null;
          selectedBuildType = null;
          renderAll();
          floatMsg("Selection cleared.");
        }
        if (e.key === " ") {
          e.preventDefault();
          state.paused = !state.paused;
          renderAll();
        }
      });
      startWaveBtn.addEventListener("click", startWave);
      speedBtn.addEventListener("click", () => {
        state.speedIndex = (state.speedIndex + 1) % state.speedOptions.length;
        renderAll();
      });
      pauseBtn.addEventListener("click", () => {
        state.paused = !state.paused;
        renderAll();
      });
      restartBtn.addEventListener("click", reset);

      function update(dt) {
        if (state.paused || state.gameOver) return;
        const simDt = Math.min(.05, dt) * state.speedOptions[state.speedIndex];
        updateSpawn(simDt);
        updateEnemies(simDt);
        updateHealers(simDt);
        updateTowers(simDt);
        updateProjectiles(simDt);
        updateParticles(simDt);
        cleanupWave();
      }

      function updateSpawn(dt) {
        if (!state.waveActive || !state.spawnQueue.length) return;
        state.spawnTimer -= dt;
        while (state.spawnTimer <= 0 && state.spawnQueue.length) {
          const next = state.spawnQueue.shift();
          spawnEnemy(next);
          state.spawnTimer += next.delay;
        }
      }

      function updateEnemies(dt) {
        for (const e of state.enemies) {
          e.age += dt;

          if (e.burn > 0) {
            damageEnemy(e, e.burnDps * dt, { source:e.burnSource, burn:true });
            e.burn -= dt;
          }

          const speed = e.speed * (e.slow > 0 ? .72 : 1);
          e.slow = Math.max(0, e.slow - dt);

          if (e.direct) {
            e.directProgress += (speed * dt) / e.directDistance;
            const p = clamp(e.directProgress, 0, 1);
            e.x = lerp(e.directStart.x, e.directEnd.x, p);
            e.baseY = lerp(e.directStart.y, e.directEnd.y, p);
            e.y = e.baseY + Math.sin(e.age * 6.4) * 18;
            if (p >= 1) e.reached = true;
            continue;
          }

          let move = speed * dt;
          while (move > 0 && e.seg < path.length - 1) {
            const a = path[e.seg], b = path[e.seg+1], segLen = Math.hypot(b.x-a.x,b.y-a.y);
            const remaining = segLen * (1 - e.progress), step = Math.min(move, remaining);
            e.progress += step / segLen;
            e.x = lerp(a.x,b.x,e.progress);
            e.y = lerp(a.y,b.y,e.progress);
            move -= step;
            if (e.progress >= .999) {
              e.seg++;
              e.progress = 0;
              if (e.seg >= path.length - 1) { e.reached = true; break; }
            }
          }
        }

        for (const e of state.enemies) if (e.reached) {
          state.lives -= e.lifeCost || 1;
          spawnParticle(e.x, e.y, "🍂", 34, .55);
        }

        const killed = state.enemies.filter(e => e.hp <= 0);
        for (const e of killed) {
          state.cash += e.reward;
          state.score += Math.round(e.maxHp + e.reward * 5);
        }

        state.enemies = state.enemies.filter(e => e.hp > 0 && !e.reached);

        if (state.lives <= 0) {
          state.lives = 0;
          state.gameOver = true;
          toast("Meadow resting");
        }
      }

      function updateHealers(dt) {
        for (const healer of state.enemies) {
          if (healer.kind !== "healer" || healer.hp <= 0) continue;
          const radius = 96;
          let healed = false;
          for (const e of state.enemies) {
            if (e.hp <= 0 || e.hp >= e.maxHp) continue;
            const d = Math.hypot(e.x - healer.x, e.y - healer.y);
            if (d <= radius) {
              e.hp = Math.min(e.maxHp, e.hp + healer.healDps * dt);
              healed = true;
            }
          }
          if (healed && Math.random() < dt * 3.8) spawnParticle(healer.x, healer.y - 10, "🌱", 18, .55);
        }
      }

      function damageEnemy(enemy, amount, opts={}) {
        if (amount <= 0 || enemy.hp <= 0) return false;
        if (isInvulnerable(enemy)) return false;

        enemy.hp -= amount;

        const tower = opts.source ? state.towers.find(t => t.id === opts.source) : null;
        if (tower && enemy.hp <= 0) tower.kills++;
        return true;
      }

      function applyBurn(enemy, dps, duration, sourceId=0) {
        if (isInvulnerable(enemy)) return;
        if (enemy.burn <= 0 || dps >= enemy.burnDps) {
          enemy.burnDps = dps;
          enemy.burn = Math.max(enemy.burn, duration);
          enemy.burnSource = sourceId;
        } else {
          enemy.burn = Math.max(enemy.burn, Math.min(duration, enemy.burn + duration * .25));
        }
      }

      function targetForTower(tower) {
        const range = statFor(tower.type, "range");
        const mode = tower.targetMode || "first";
        let best = null, bestScore = -Infinity;

        for (const e of state.enemies) {
          if (isInvulnerable(e)) continue;

          const d = Math.hypot(e.x - tower.x, e.y - tower.y);
          if (d > range) continue;

          const progress = travelScore(e);
          const typeBias = enemyTypes[e.kind]?.priority || 0;
          let score = 0;

          if (mode === "first") score = progress + typeBias - d * .08;
          else if (mode === "last") score = -progress + typeBias * .35 - d * .04;
          else if (mode === "hp") score = e.hp + e.maxHp * .08 + typeBias * 2 - d * .03;

          if (score > bestScore) { best = e; bestScore = score; }
        }
        return best;
      }

      function updateTowers(dt) {
        for (const t of state.towers) {
          const type = towerTypes[t.type];
          t.pulse = Math.max(0, t.pulse - dt);
          t.cooldown = Math.max(0, t.cooldown - dt);

          if (type.family === "aura") {
            const range = statFor(t.type,"range"), dps = statFor(t.type,"auraDps");
            let hit = false;
            for (const e of state.enemies) {
              const d = Math.hypot(e.x-t.x,e.y-t.y);
              if (d <= range && !isInvulnerable(e)) {
                const edge = 1 - d / range;
                damageEnemy(e, dps * (.55 + edge * .75) * dt, { source:t.id, aura:true });
                applyBurn(e, dps * .18, .5, t.id);
                e.slow = Math.max(e.slow, .14);
                hit = true;
              }
            }
            if (hit) {
              t.pulse = .32;
              if (Math.random() < dt * 9) spawnParticle(t.x + (Math.random()-.5)*range*1.1, t.y + (Math.random()-.5)*range*1.1, type.emoji, 18, .5);
            }
            continue;
          }

          const target = targetForTower(t);
          if (!target) continue;
          t.angle = Math.atan2(target.y-t.y, target.x-t.x);
          const fireRate = Math.max(.15, statFor(t.type,"fireRate"));
          if (t.cooldown <= 0) {
            t.cooldown = 1 / fireRate;
            t.pulse = .22;
            state.projectiles.push({
              id:state.nextId++, type:t.type, towerId:t.id, x:t.x + Math.cos(t.angle)*20, y:t.y + Math.sin(t.angle)*20,
              tx:target.x, ty:target.y, targetId:target.id, speed:type.family === "aoe" ? 420 : 560,
              damage:statFor(t.type,"damage"), splash:type.splash, age:0, maxAge:1.8
            });
            spawnParticle(t.x, t.y, "🍃", 13, .16);
          }
        }
      }

      function updateProjectiles(dt) {
        for (const p of state.projectiles) {
          p.age += dt;
          const target = state.enemies.find(e => e.id === p.targetId);
          if (target && !isInvulnerable(target)) { p.tx = target.x; p.ty = target.y; }
          const dx = p.tx-p.x, dy = p.ty-p.y, d = Math.hypot(dx,dy) || 1, step = p.speed * dt;
          if (step >= d || d < 12) { hitProjectile(p); p.dead = true; }
          else { p.x += dx/d*step; p.y += dy/d*step; }
          if (p.age > p.maxAge) p.dead = true;
        }
        state.projectiles = state.projectiles.filter(p => !p.dead);
      }

      function hitProjectile(p) {
        const main = state.enemies.find(e => e.id === p.targetId);
        if (p.splash > 0) {
          spawnParticle(p.tx, p.ty, "🌸", 18, .32);
          for (const e of state.enemies) {
            const d = Math.hypot(e.x-p.tx,e.y-p.ty);
            if (d <= p.splash) {
              const falloff = .35 + .65 * (1 - d / p.splash);
              damageEnemy(e, p.damage * falloff, { source:p.towerId, splash:true });
              applyBurn(e, p.damage * .12, 1.35, p.towerId);
            }
          }
        } else if (main) {
          damageEnemy(main, p.damage, { source:p.towerId });
          applyBurn(main, p.damage * .07, .85, p.towerId);
          spawnParticle(main.x, main.y, "✨", 14, .22);
        }
      }

      function cleanupWave() {
        if (state.waveActive && state.spawnQueue.length === 0 && state.enemies.length === 0) {
          state.waveActive = false;
          const late = Math.max(0, state.wave - 8);
          const bonus = Math.round(28 + state.wave * 5.6 + Math.pow(state.wave, 1.58) * 2.8 + late * late * 2.4 + state.lives * .85);
          state.cash += bonus;
          state.score += bonus * 3;
          toast(`Stroll ${state.wave} complete · +💧${bonus}`);
          state.waveName = wavePlan(state.wave + 1).name;
          renderAll();
          if (state.wave >= 30) {
            state.gameOver = true;
            state.victory = true;
            toast("Meadow in balance");
          }
        }
      }

      function spawnParticle(x,y,text,size,life) {
        state.particles.push({ x, y, text, size, life, maxLife:life, vx:(Math.random()-.5)*36, vy:-25-Math.random()*35, rot:(Math.random()-.5)*.8 });
      }

      function updateParticles(dt) {
        for (const p of state.particles) {
          p.life -= dt;
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 20 * dt;
          p.rot += dt;
        }
        state.particles = state.particles.filter(p => p.life > 0).slice(-170);
      }

      function draw() {
        ctx.clearRect(0,0,W,H);
        drawBackground();
        drawPath();
        drawTowers();
        drawEnemies();
        drawProjectiles();
        drawParticles();
        drawMousePreview();
        drawOverlay();
      }

      function drawBackground() {
        ctx.fillStyle = "#eaf7ef";
        ctx.fillRect(0,0,W,H);
        ctx.save();
        ctx.globalAlpha = .26;
        for (let x = -60; x < W + 60; x += 58) {
          for (let y = -40; y < H + 60; y += 58) {
            ctx.fillStyle = ((x+y)/58)%2 ? "#d8f0df" : "#f5fbf6";
            ctx.beginPath();
            ctx.arc(x + ((y/58)%2)*18, y, 4, 0, TWO_PI);
            ctx.fill();
          }
        }
        ctx.restore();
        const meadowGlow = ctx.createLinearGradient(0,0,0,H);
        meadowGlow.addColorStop(0,"rgba(255,255,255,.42)");
        meadowGlow.addColorStop(1,"rgba(126,188,142,.10)");
        ctx.fillStyle = meadowGlow;
        ctx.fillRect(0,0,W,H);
        ctx.save();
        ctx.globalAlpha = .08;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        for (let x = 32; x < W; x += 42) {
          ctx.beginPath();
          ctx.moveTo(x,0);
          ctx.lineTo(x,H);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawPath() {
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "rgba(103,139,109,.18)";
        ctx.lineWidth = 76;
        drawPolyline(path);
        ctx.strokeStyle = "#d7c6a8";
        ctx.lineWidth = 66;
        drawPolyline(path);
        ctx.strokeStyle = "#ead9b8";
        ctx.lineWidth = 48;
        drawPolyline(path);
        ctx.strokeStyle = "rgba(123,156,128,.32)";
        ctx.lineWidth = 3;
        ctx.setLineDash([10,18]);
        drawPolyline(path);
        ctx.setLineDash([]);
        ctx.font = "28px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("🌱", 36, 358);
        ctx.fillText("🏡", W-40, 430);
        ctx.restore();
      }

      function drawPolyline(points) {
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i=1; i<points.length; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.stroke();
      }

      function drawTowers() {
        for (const t of state.towers) {
          const type = towerTypes[t.type], range = statFor(t.type,"range"), selected = t.id === selectedTowerId;
          if (selected) {
            ctx.save();
            ctx.globalAlpha = .32;
            ctx.fillStyle = type.color;
            ctx.beginPath();
            ctx.arc(t.x,t.y,range,0,TWO_PI);
            ctx.fill();
            ctx.restore();
          }
          if (selected && type.family === "aura") {
            ctx.save();
            const r = range * (.82 + Math.sin(performance.now()/260 + t.id) * .035);
            ctx.globalAlpha = .28 + t.pulse * .25;
            ctx.strokeStyle = type.color;
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(t.x,t.y,r,0,TWO_PI);
            ctx.stroke();
            ctx.restore();
          }

          ctx.save();
          ctx.translate(t.x,t.y);
          ctx.rotate(t.angle || 0);
          ctx.fillStyle = "rgba(0,0,0,.35)";
          ctx.beginPath();
          ctx.ellipse(0,16,28,14,0,0,TWO_PI);
          ctx.fill();
          ctx.rotate(-(t.angle || 0));
          ctx.font = `${34 + t.pulse*18}px "Apple Color Emoji", "Segoe UI Emoji", sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(type.emoji, 0, 0);
          if (selected) {
            ctx.strokeStyle = "#8fce9b";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0,0,27,0,TWO_PI);
            ctx.stroke();
          }
          ctx.restore();
        }
      }

      function drawCritter(emoji, x, y, size, wobble=0, hpPct=1) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Math.sin(wobble) * .045);
        ctx.font = `${size}px "Apple Color Emoji", "Segoe UI Emoji", sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = "rgba(61,92,67,.24)";
        ctx.shadowBlur = 6;
        ctx.shadowOffsetY = 3;
        ctx.fillText(emoji, 0, 0);
        ctx.shadowColor = "transparent";
        if (hpPct < .35) {
          ctx.globalAlpha = .75;
          ctx.font = `${Math.max(12, size * .34)}px "Apple Color Emoji", "Segoe UI Emoji", sans-serif`;
          ctx.fillText("💤", size * .28, -size * .42);
        }
        ctx.restore();
      }

      function drawEnemies() {
        const sorted = [...state.enemies].sort((a,b)=>a.y-b.y);
        for (const e of sorted) {
          const type = enemyTypes[e.kind] || enemyTypes.normal;
          const size = type.size;
          const invulnerable = isInvulnerable(e);
          const emoji = e.kind === "shielder" ? shieldEmoji(e) : e.emoji;

          if (e.kind === "candy") {
            ctx.save();
            ctx.globalAlpha = .22;
            ctx.fillStyle = "#c9a9ee";
            ctx.beginPath();
            ctx.ellipse(e.x, e.y + size*.58, size*.52, size*.18, 0, 0, TWO_PI);
            ctx.fill();
            ctx.restore();
          }

          drawCritter(emoji, e.x, e.y, size, e.age * 5, e.hp/e.maxHp);

          const w = size * 1.25, h = 5, pct = clamp(e.hp/e.maxHp,0,1), burning = e.burn > 0;
          ctx.fillStyle = "rgba(0,0,0,.55)";
          ctx.fillRect(e.x-w/2, e.y-size*.78, w, h);
          ctx.fillStyle = invulnerable ? "#66b7ff" : burning ? "#dfa7d8" : pct > .55 ? type.color : pct > .25 ? "#f0d97a" : "#ef8080";
          ctx.fillRect(e.x-w/2, e.y-size*.78, w*pct, h);

          if (burning && !invulnerable) {
            ctx.fillStyle = "#f7e7a6";
            ctx.fillRect(e.x-w/2, e.y-size*.78, Math.max(2, w*pct*.28), h);
          }

          if (e.kind === "shielder") {
            ctx.save();
            ctx.globalAlpha = invulnerable ? .22 + Math.sin(e.age * 14) * .05 : .08;
            ctx.strokeStyle = invulnerable ? "#8abfdd" : "#8fd89d";
            ctx.lineWidth = invulnerable ? 3 : 2;
            ctx.beginPath();
            ctx.arc(e.x, e.y, size*.56, 0, TWO_PI);
            ctx.stroke();
            ctx.restore();
          }

          if (e.kind === "healer") {
            ctx.save();
            ctx.globalAlpha = .12 + Math.sin(e.age * 5) * .03;
            ctx.fillStyle = "#8fd89d";
            ctx.beginPath();
            ctx.arc(e.x, e.y, 96, 0, TWO_PI);
            ctx.fill();
            ctx.restore();
          }
        }
      }

      function drawProjectiles() {
        for (const p of state.projectiles) {
          const tower = towerTypes[p.type];
          ctx.save();
          ctx.translate(p.x,p.y);
          ctx.rotate(Math.atan2(p.ty-p.y,p.tx-p.x));
          ctx.font = `${tower.family === "aoe" ? 18 : 14}px "Apple Color Emoji", "Segoe UI Emoji", sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(tower.family === "aoe" ? "🌸" : "🍃", 0, 0);
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const p of state.particles) {
          const a = clamp(p.life / p.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = a;
          ctx.translate(p.x,p.y);
          ctx.rotate(p.rot);
          ctx.font = `${p.size}px "Apple Color Emoji", "Segoe UI Emoji", sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(p.text, 0, 0);
          ctx.restore();
        }
      }

      function drawMousePreview() {
        if (!mouse.inside || state.gameOver || !selectedBuildType) return;
        const type = towerTypes[selectedBuildType], valid = canBuildAt(mouse.x,mouse.y), canAfford = state.cash >= type.cost;
        ctx.save();
        ctx.globalAlpha = .45;
        ctx.fillStyle = valid.ok && canAfford ? type.color : "#ff4a4a";
        ctx.beginPath();
        ctx.arc(mouse.x,mouse.y,statFor(selectedBuildType,"range"),0,TWO_PI);
        ctx.fill();
        ctx.globalAlpha = .92;
        ctx.font = "34px \"Apple Color Emoji\", \"Segoe UI Emoji\", sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(type.emoji, mouse.x, mouse.y);
        ctx.restore();
      }

      function drawOverlay() {
        if (!state.gameOver && !state.paused) return;
        ctx.save();
        ctx.fillStyle = "rgba(237,247,240,.72)";
        ctx.fillRect(0,0,W,H);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#24362c";
        ctx.font = "900 46px system-ui";
        ctx.fillText(state.gameOver ? (state.victory ? "Meadow Restored" : "Garden Needs Rest") : "Paused", W/2, H/2 - 28);
        ctx.fillStyle = "#6f8576";
        ctx.font = "18px system-ui";
        ctx.fillText(state.gameOver ? `Harmony ${state.score} · Stroll ${state.wave}` : "Press Space or Resume to continue", W/2, H/2 + 20);
        ctx.restore();
      }

      function loop(now) {
        const dt = (now - lastT) / 1000;
        lastT = now;
        update(dt);
        draw();
        renderStats();
        renderBoardControls();
        raf = requestAnimationFrame(loop);
      }

      reset();
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
