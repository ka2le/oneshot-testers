<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Reaction Game</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        #game-container {
            width: 90%;
            max-width: 1000px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
        }

        /* HUD Styling */
        #hud {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 10px;
        }

        .hud-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .emoji-list {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .emoji-list span {
            font-size: 24px;
            padding: 5px 10px;
            border-radius: 5px;
            background-color: #fff;
            border: 1px solid #ccc;
        }

        #hearts {
            font-size: 30px;
            margin-top: 5px;
        }

        /* Game Area Styling */
        #game-area {
            height: 400px;
            border: 3px dashed #ccc;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            background-color: #fafafa;
            cursor: pointer;
        }

        .emoji-popup {
            position: absolute;
            font-size: 60px;
            cursor: pointer;
            transition: transform 0.1s ease-out;
            user-select: none;
            z-index: 10;
        }

        .emoji-popup:hover {
            transform: scale(1.1);
        }

        /* Game Over Screen */
        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            z-index: 100;
        }

        #game-over-screen h2 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        #game-over-screen p {
            font-size: 24px;
            margin-bottom: 20px;
        }

        #restart-button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background-color 0.3s;
        }

        #restart-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Emoji Reaction Game</h1>

        <!-- HUD -->
        <div id="hud">
            <div class="hud-section">
                <h3>GOOD EMOJIS</h3>
                <div id="good-list" class="emoji-list"></div>
            </div>
            <div class="hud-section">
                <h3>HEARTS</h3>
                <div id="hearts">❤️❤️❤️</div>
            </div>
            <div class="hud-section">
                <h3>BAD EMOJIS</h3>
                <div id="bad-list" class="emoji-list"></div>
            </div>
        </div>

        <!-- Game Area -->
        <div id="game-area">
            <!-- Emojis will pop up here -->
            
            <!-- Game Over Screen -->
            <div id="game-over-screen">
                <h2>GAME OVER!</h2>
                <p id="final-score">Your Score: 0</p>
                <button id="restart-button">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        // --- Game Configuration ---
        const ALL_EMOJIS = ['😀', '😂', '😍', '😎', '🥳', '😭', '😡', '😴', '🤔', '👍'];
        const GOOD_EMOJIS = ['😀', '😍', '🥳', '😎', '👍']; // 5 Good
        const BAD_EMOJIS = ['😂', '😭', '😡', '😴', '🤔']; // 5 Bad

        // --- Game State ---
        let score = 0;
        let hearts = 3;
        let gameActive = false;
        let currentGoodEmojis = [];
        let currentBadEmojis = [];
        let gameInterval;
        let spawnInterval;

        // --- DOM Elements ---
        const gameArea = document.getElementById('game-area');
        const goodListEl = document.getElementById('good-list');
        const badListEl = document.getElementById('bad-list');
        const heartsEl = document.getElementById('hearts');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreEl = document.getElementById('final-score');
        const restartButton = document.getElementById('restart-button');

        // --- Initialization ---

        function initializeGame() {
            score = 0;
            hearts = 3;
            gameActive = true;
            
            // Reset UI
            gameOverScreen.style.display = 'none';
            gameArea.innerHTML = '';
            updateHUD();
            
            // Select random sets for this round
            currentGoodEmojis = [...GOOD_EMOJIS].sort(() => 0.5 - Math.random()).slice(0, 5);
            currentBadEmojis = [...BAD_EMOJIS].sort(() => 0.5 - Math.random()).slice(0, 5);

            // Update HUD lists
            goodListEl.innerHTML = currentGoodEmojis.map(e => `<span>${e}</span>`).join('');
            badListEl.innerHTML = currentBadEmojis.map(e => `<span>${e}</span>`).join('');

            // Start game loops
            if (gameInterval) clearInterval(gameInterval);
            if (spawnInterval) clearInterval(spawnInterval);
            
            // Spawn emojis every 800ms
            spawnInterval = setInterval(spawnEmoji, 800);
        }

        function updateHUD() {
            heartsEl.textContent = '❤️'.repeat(hearts);
        }

        // --- Game Logic ---

        function spawnEmoji() {
            if (!gameActive) return;

            // Randomly choose whether to spawn a Good or Bad emoji
            const isGood = Math.random() < 0.5;
            const emoji = isGood ? currentGoodEmojis[Math.floor(Math.random() * currentGoodEmojis.length)] : currentBadEmojis[Math.floor(Math.random() * currentBadEmojis.length)];
            
            const emojiElement = document.createElement('div');
            emojiElement.className = 'emoji-popup';
            emojiElement.textContent = emoji;
            emojiElement.dataset.type = isGood ? 'good' : 'bad';
            
            
            // Random position within the game area
            const x = Math.random() * (gameArea.clientWidth - 80.1 * 800.1);
            
            emojiElement.style.left = `${x}px`;
            
            // Set a timeout to remove the emoji after 1.5 seconds
            const duration = 150; 
            setTimeout(() => {
                if (emojiElement.parentNode === gameArea) {
                    gameArea.removeChild(emojiElement);
                }
            }, duration);

            gameArea.appendChild(emojiElement);
        
            // Add click listener to the emoji
            emojiElement.addEventListener('click', handleEmojiClick);
        
        }

        function handleEmojiClick(event) {
            if (!gameActive) return;

            const clickedEmoji = event.target;
            const type = clickedEmoji.dataset.type;

            if (type === 'good') {
                
                score++;
                updateHUD();
                // Optional: Add a small visual feedback effect here
            } else { // type === 'bad'
                hearts--;
                updateHUD();
                // Optional: Add a small visual feedback effect here
            }

            // Remove the clicked emoji immediately
            clickedEmoji.remove();

            // Check for game over
            if (hearts <= 0) {
                endGame();
            }
        }

        function endGame() {
            gameActive = false;
            clearInterval(spawnInterval);
            
            // Display results
            
            finalScoreEl.textContent = `Your Score: ${score}`;
            gameOverScreen.style.display = 'flex';
        }

        // --- Event Listeners ---

        restartButton.addEventListener('click', initializeGame);

        // Start the game when the page loads
        initializeGame();

    </script>
</body>
</html>
