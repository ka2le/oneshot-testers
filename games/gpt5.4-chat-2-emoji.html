<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emoji Tap Game</title>
<style>
  :root {
    --bg1: #0f172a;
    --bg2: #1e293b;
    --panel: rgba(255, 255, 255, 0.08);
    --panel-border: rgba(255, 255, 255, 0.15);
    --text: #f8fafc;
    --muted: #cbd5e1;
    --good: #22c55e;
    --bad: #ef4444;
    --accent: #38bdf8;
    --shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top, #1d4ed8 0%, transparent 30%),
      radial-gradient(circle at bottom right, #7c3aed 0%, transparent 25%),
      linear-gradient(160deg, var(--bg1), var(--bg2));
    min-height: 100vh;
    overflow: hidden;
  }

  .game {
    display: grid;
    grid-template-columns: 240px 1fr 240px;
    gap: 16px;
    height: 100vh;
    padding: 16px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 22px;
    padding: 18px;
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
  }

  .panel h2 {
    margin: 0 0 8px;
    font-size: 24px;
  }

  .panel p {
    margin: 0 0 14px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.4;
  }

  .emoji-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 6px;
  }

  .emoji-card {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 12px;
    font-size: 34px;
    text-align: center;
    user-select: none;
  }

  .good-title { color: #86efac; }
  .bad-title { color: #fca5a5; }

  .center {
    position: relative;
    min-width: 0;
  }

  .hud {
    position: absolute;
    top: 16px;
    left: 16px;
    right: 16px;
    z-index: 20;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    pointer-events: none;
  }

  .hud-box {
    background: rgba(15, 23, 42, 0.7);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    padding: 12px 16px;
    backdrop-filter: blur(10px);
    box-shadow: var(--shadow);
    font-weight: bold;
  }

  .score {
    font-size: 24px;
  }

  .hearts {
    font-size: 28px;
    letter-spacing: 4px;
  }

  .playfield {
    position: relative;
    height: 100%;
    border-radius: 28px;
    overflow: hidden;
    background:
      linear-gradient(rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 0,
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 50px
      ),
      repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03) 0,
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 50px
      );
    border: 1px solid var(--panel-border);
    box-shadow: var(--shadow);
  }

  .instructions {
    position: absolute;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(15, 23, 42, 0.7);
    border: 1px solid var(--panel-border);
    border-radius: 999px;
    padding: 10px 16px;
    color: var(--muted);
    font-size: 14px;
    backdrop-filter: blur(8px);
  }

  .emoji {
    position: absolute;
    width: 76px;
    height: 76px;
    display: grid;
    place-items: center;
    font-size: 44px;
    background: rgba(255, 255, 255, 0.14);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 20px;
    cursor: pointer;
    user-select: none;
    transform: scale(0.6);
    animation: popIn 0.18s ease-out forwards, bob 1.4s ease-in-out infinite;
    transition: transform 0.1s ease, background 0.15s ease;
  }

  .emoji:hover {
    transform: scale(1.08);
    background: rgba(255, 255, 255, 0.2);
  }

  .emoji.good { box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.18), 0 12px 25px rgba(0, 0, 0, 0.25); }
  .emoji.bad { box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.18), 0 12px 25px rgba(0, 0, 0, 0.25); }

  .floating-score {
    position: absolute;
    font-weight: bold;
    font-size: 26px;
    pointer-events: none;
    animation: floatUp 0.8s ease-out forwards;
    text-shadow: 0 6px 14px rgba(0,0,0,0.35);
  }

  .floating-score.good { color: #86efac; }
  .floating-score.bad { color: #fca5a5; }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(2, 6, 23, 0.72);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    backdrop-filter: blur(6px);
  }

  .overlay-card {
    width: min(92%, 420px);
    background: rgba(15, 23, 42, 0.92);
    border: 1px solid var(--panel-border);
    border-radius: 26px;
    padding: 28px;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .overlay-card h1 {
    margin: 0 0 12px;
    font-size: 40px;
  }

  .overlay-card p {
    margin: 10px 0;
    color: var(--muted);
    font-size: 18px;
  }

  .final-score {
    font-size: 54px;
    font-weight: bold;
    margin: 8px 0 18px;
    color: #fef08a;
  }

  button {
    border: 0;
    border-radius: 16px;
    padding: 14px 22px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg, #0ea5e9, #2563eb);
    box-shadow: 0 14px 30px rgba(37, 99, 235, 0.35);
    transition: transform 0.12s ease, opacity 0.12s ease;
  }

  button:hover { transform: translateY(-2px); }
  button:active { transform: translateY(1px); }

  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  @keyframes bob {
    0% { translate: 0 0; }
    50% { translate: 0 -6px; }
    100% { translate: 0 0; }
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -40px); }
  }

  @media (max-width: 900px) {
    .game {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr auto;
      height: auto;
      min-height: 100vh;
    }

    .panel {
      min-height: auto;
    }

    .emoji-list {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .center {
      min-height: 58vh;
    }
  }
</style>
</head>
<body>
  <div class="game">
    <aside class="panel">
      <h2 class="good-title">Good</h2>
      <p>Tap these for points.</p>
      <div id="goodList" class="emoji-list"></div>
    </aside>

    <main class="center">
      <div class="hud">
        <div class="hud-box score">Score: <span id="score">0</span></div>
        <div class="hud-box hearts" id="hearts">❤️ ❤️ ❤️</div>
      </div>

      <div id="playfield" class="playfield">
        <div class="instructions">Tap the good emojis. Avoid the bad ones.</div>

        <div id="startOverlay" class="overlay">
          <div class="overlay-card">
            <h1>Emoji Tap</h1>
            <p>Each round has 5 good emojis and 5 bad emojis.</p>
            <p>Hit the good ones to score. Hit the bad ones and lose hearts.</p>
            <button id="startButton">Start Game</button>
          </div>
        </div>

        <div id="gameOverOverlay" class="overlay" style="display:none;">
          <div class="overlay-card">
            <h1>Game Over</h1>
            <p>Your score</p>
            <div id="finalScore" class="final-score">0</div>
            <button id="restartButton">Restart</button>
          </div>
        </div>
      </div>
    </main>

    <aside class="panel">
      <h2 class="bad-title">Bad</h2>
      <p>Tap these and you lose a heart.</p>
      <div id="badList" class="emoji-list"></div>
    </aside>
  </div>

<script>
  const ALL_EMOJIS = ["🍕", "🚀", "🐶", "🌈", "🎵", "🍩", "⚡", "🎈", "🍀", "😺"];

  const goodList = document.getElementById("goodList");
  const badList = document.getElementById("badList");
  const playfield = document.getElementById("playfield");
  const scoreEl = document.getElementById("score");
  const heartsEl = document.getElementById("hearts");
  const finalScoreEl = document.getElementById("finalScore");
  const startOverlay = document.getElementById("startOverlay");
  const gameOverOverlay = document.getElementById("gameOverOverlay");
  const startButton = document.getElementById("startButton");
  const restartButton = document.getElementById("restartButton");

  let score = 0;
  let hearts = 3;
  let isRunning = false;
  let spawnInterval = null;
  let activeEmojiTimeouts = [];
  let goodEmojis = [];
  let badEmojis = [];

  function shuffle(array) {
    const copy = [...array];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function setupRound() {
    const shuffled = shuffle(ALL_EMOJIS);
    goodEmojis = shuffled.slice(0, 5);
    badEmojis = shuffled.slice(5, 10);
    renderLists();
  }

  function renderLists() {
    goodList.innerHTML = "";
    badList.innerHTML = "";

    goodEmojis.forEach(emoji => {
      const div = document.createElement("div");
      div.className = "emoji-card";
      div.textContent = emoji;
      goodList.appendChild(div);
    });

    badEmojis.forEach(emoji => {
      const div = document.createElement("div");
      div.className = "emoji-card";
      div.textContent = emoji;
      badList.appendChild(div);
    });
  }

  function updateHUD() {
    scoreEl.textContent = score;
    heartsEl.textContent = "❤️ ".repeat(hearts).trim() || "💀";
  }

  function clearActiveEmojis() {
    playfield.querySelectorAll(".emoji, .floating-score").forEach(el => el.remove());
    activeEmojiTimeouts.forEach(timeoutId => clearTimeout(timeoutId));
    activeEmojiTimeouts = [];
  }

  function showFloatingText(text, x, y, type) {
    const el = document.createElement("div");
    el.className = `floating-score ${type}`;
    el.textContent = text;
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    playfield.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  function getRandomEmojiData() {
    const isGood = Math.random() < 0.5;
    const emoji = isGood
      ? goodEmojis[Math.floor(Math.random() * goodEmojis.length)]
      : badEmojis[Math.floor(Math.random() * badEmojis.length)];
    return { emoji, type: isGood ? "good" : "bad" };
  }

  function spawnEmoji() {
    if (!isRunning) return;

    const { emoji, type } = getRandomEmojiData();
    const el = document.createElement("button");
    el.className = `emoji ${type}`;
    el.type = "button";
    el.textContent = emoji;

    const size = 76;
    const hudSafeTop = 92;
    const bottomPadding = 80;
    const maxX = Math.max(10, playfield.clientWidth - size - 10);
    const maxY = Math.max(hudSafeTop, playfield.clientHeight - size - bottomPadding);
    const x = Math.random() * (maxX - 10) + 10;
    const y = Math.random() * (maxY - hudSafeTop) + hudSafeTop;

    el.style.left = `${x}px`;
    el.style.top = `${y}px`;

    let removed = false;

    function removeEmoji() {
      if (removed) return;
      removed = true;
      el.remove();
    }

    el.addEventListener("click", () => {
      if (!isRunning || removed) return;

      removeEmoji();

      if (type === "good") {
        score += 1;
        showFloatingText("+1", x + 38, y + 14, "good");
      } else {
        hearts -= 1;
        showFloatingText("-1 ❤️", x + 38, y + 14, "bad");
      }

      updateHUD();

      if (hearts <= 0) endGame();
    });

    playfield.appendChild(el);

    const timeoutId = setTimeout(() => removeEmoji(), 1900);
    activeEmojiTimeouts.push(timeoutId);
  }

  function startSpawning() {
    clearInterval(spawnInterval);
    spawnInterval = setInterval(() => {
      spawnEmoji();
      if (Math.random() < 0.45) setTimeout(() => spawnEmoji(), 240);
    }, 650);
  }

  function startGame() {
    score = 0;
    hearts = 3;
    isRunning = true;

    setupRound();
    updateHUD();
    clearActiveEmojis();

    startOverlay.style.display = "none";
    gameOverOverlay.style.display = "none";

    startSpawning();
  }

  function endGame() {
    isRunning = false;
    clearInterval(spawnInterval);
    clearActiveEmojis();
    finalScoreEl.textContent = score;
    gameOverOverlay.style.display = "flex";
  }

  startButton.addEventListener("click", startGame);
  restartButton.addEventListener("click", startGame);

  setupRound();
  updateHUD();
</script>
</body>
</html>
