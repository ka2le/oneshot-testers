<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Guessing Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HUD Section */
        #hud {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background-color: #34495e;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .hud-panel {
            width: 250px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
        }

        .hud-panel h3 {
            margin-top: 0;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
            text-align: center;
        }

        .hud-panel ul {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.9rem;
        }

        .hud-panel li {
            margin-bottom: 4px;
        }

        /* Game Area */
        #game-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: linear-gradient(135deg, #4b6cb7 0%, #2c3e50 100%);
        }

        /* Emojis to click */
        .click-emoji {
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            z-index: 5;
        }

        .click-emoji:active {
            transform: scale(0.9);
        }

        /* Game Over Screen */
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; /* Hidden by default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        #game-over-screen h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #e74c3c;
        }

        #final-score {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 24px;
            font-size: 1.2rem;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2ecc71;
        }

        /* Floating hearts */
        .floating-heart {
            position: absolute;
            font-size: 30px;
            color: #e74c3c;
            animation: floatUp 1.5s ease-out forwards;
            pointer-events: none;
            z-index: 15;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* Pop effect for good answer */
        .pop-anim {
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

    </style>
</head>
<body>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-panel">
            <h3 style="color: #2ecc71;">GOOD (Points)</h3>
            <ul id="good-list"></ul>
        </div>
        
        <!-- Game Center -->
        <div id="game-area">
            <!-- Emojis will appear here via JS -->
        </div>

        <div class="hud-panel">
            <h3 style="color: #e74c3c;">BAD (Hearts)</h3>
            <ul id="bad-list"></ul>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <div id="final-score">Score: 0</div>
        <button onclick="startGame()">Play Again</button>
    </div>

    <script>
        // --- Game Configuration ---
        const allEmojis = ["🐶", "🐱", "🐭", "🐹", "🐰", "🐻", "🐼", "🐨", "🐯", "🦄"];
        const maxLives = 3;
        const attemptsPerRound = 5; // Player has 5 chances per round
        
        // --- Game State ---
        let score = 0;
        let lives = maxLives;
        let goodEmojis = [];
        let badEmojis = [];
        let currentAttempt = 0;
        let isGameOver = false;
        let gameInterval;

        // --- DOM Elements ---
        const gameArea = document.getElementById('game-area');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const goodListEl = document.getElementById('good-list');
        const badListEl = document.getElementById('bad-list');

        // --- Functions ---

        function startGame() {
            // Reset State
            score = 0;
            lives = maxLives;
            currentAttempt = 0;
            isGameOver = false;
            goodEmojis = [];
            badEmojis = [];

            // Reset UI
            gameOverScreen.style.display = 'none';
            gameArea.innerHTML = ''; // Clear board
            
            // Update HUD Lists (Randomly pick 5 good, 5 bad from the 10 available)
            pickRandomPools();

            // Start Loop
            startGameRound();
        }

        function pickRandomPools() {
            // Create a copy and shuffle
            let pool = [...allEmojis];
            
            // Fisher-Yates shuffle
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            // Split first 5 into Good, last 5 into Bad
            goodEmojis = pool.slice(0, 5);
            badEmojis = pool.slice(5, 10);

            renderLists();
        }

        function renderLists() {
            goodListEl.innerHTML = goodEmojis.map(emoji => `<li>${emoji}</li>`).join('');
            badListEl.innerHTML = badEmojis.map(emoji => `<li>${emoji}</li>`).join('');
        }

        function startGameRound() {
            if (lives <= 0) {
                endGame();
                return;
            }

            // Clear previous emojis
            gameArea.innerHTML = '';
            currentAttempt = 0;

            // Game Timer: New emoji every 3 seconds
            gameInterval = setInterval(() => {
                spawnEmoji();
            }, 2000);
        }

        function spawnEmoji() {
            if (lives <= 0 || isGameOver) return;

            // Pick random item from the pool we defined earlier
            // We use Math.floor(Math.random() * 10) to get index 0-9
            const randomIndex = Math.floor(Math.random() * allEmojis.length);
            const randomEmoji = allEmojis[randomIndex];

            const emojiEl = document.createElement('div');
            emojiEl.classList.add('click-emoji');
            emojiEl.textContent = randomEmoji;

            // Determine if it is Good or Bad
            const isGood = goodEmojis.includes(randomEmoji);
            
            // Add hover effect logic handled in click
            emojiEl.onmousedown = () => {
                // Small scale down effect
                emojiEl.style.transform = 'scale(0.9)';
                setTimeout(() => emojiEl.style.transform = 'scale(1)', 100);

                // Check logic immediately on click (or mousedown)
                handleClick(randomEmoji, isGood, emojiEl);
            };

            gameArea.appendChild(emojiEl);
        }

        function handleClick(emoji, isGood, element) {
            // Check if it's a valid attempt
            if (currentAttempt >= attemptsPerRound) return;

            // Visual Feedback
            const isCorrect = isGood;

            if (isCorrect) {
                // Correct!
                score += 10;
                element.classList.add('pop-anim'); // Add pop animation
                createFloatingText("+10 pts", element);
                
                // Remove from DOM after animation
                setTimeout(() => {
                    element.remove();
                }, 300);
            } else {
                // Wrong!
                lives--;
                element.classList.add('pop-anim'); // Add pop effect
                createFloatingText("Oof!", element);

                // Remove from DOM immediately on fail so we can't click it again
                // or remove it from the HUD lists
                setTimeout(() => {
                    element.remove();
                }, 1000);

                // Flash Red to indicate error
                document.getElementById('game-area').style.backgroundColor = '#e74c3c';
                setTimeout(() => {
                    document.getElementById('game-area').style.backgroundColor = ''; // Reset to gradient
                }, 200);
            }

            // Check if lives are gone immediately after fail
            if (lives <= 0) {
                endGame();
            }
            
            // Increment attempts
            currentAttempt++;
        }

        function createFloatingText(text, element) {
            const rect = element.getBoundingClientRect();
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.textContent = text;
            // Center relative to parent or absolute
            heart.style.left = (rect.left + rect.width/2 - 20) + 'px';
            heart.style.top = rect.top + 'px';
            document.body.appendChild(heart);
            
            // Remove heart after animation
            setTimeout(() => {
                heart.remove();
            }, 1500);
        }

        function endGame() {
            clearInterval(gameInterval);
            isGameOver = true;
            finalScoreDisplay.textContent = `Final Score: ${score}`;
            gameOverScreen.style.display = 'flex';
        }

        // Initialize game on load
        startGame();

    </script>
</body>
</html>
