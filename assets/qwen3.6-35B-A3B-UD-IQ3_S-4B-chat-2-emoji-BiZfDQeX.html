<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji Catcher</title>
  <style>
    :root {
      --bg-color: #1a1a2e;
      --panel-bg: rgba(255, 255, 255, 0.1);
      --accent-color: #e94560;
      --text-color: #ffffff;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none; /* Prevents highlighting text while clicking */
    }

    /* Game Container */
    #game-container {
      position: relative;
      width: 100%;
      max-width: 600px;
      height: 90vh;
      background: linear-gradient(180deg, #16213e 0%, #1a1a2e 100%);
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      overflow: hidden;
      border: 2px solid #333;
    }

    /* Heads Up Display (HUD) */
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 15px;
      box-sizing: border-box;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(5px);
      z-index: 10;
    }

    .hud-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hud-label {
      font-size: 0.8rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hud-score {
      font-size: 1.5rem;
      font-weight: bold;
      color: #4caf50;
    }

    .hud-emojis {
      font-size: 1.2rem;
      margin-top: 5px;
    }

    /* The Play Area */
    #play-area {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    /* Falling Emojis */
    .emoji {
      position: absolute;
      font-size: 3rem;
      cursor: pointer;
      transition: transform 0.1s;
      /* Center the emoji on its coordinates */
      transform: translate(-50%, -50%); 
      will-change: top;
    }

    .emoji:active {
      transform: translate(-50%, -50%) scale(0.8);
    }

    /* Screens (Start / Game Over) */
    .screen-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 0 0 10px var(--accent-color);
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      max-width: 80%;
      line-height: 1.5;
    }

    /* Buttons */
    button {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      font-weight: bold;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
    }

    button:active {
      transform: scale(0.95);
    }

    /* Animations */
    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    }

    .popped {
      animation: pop 0.2s ease-out forwards;
      pointer-events: none; /* Prevent double clicking */
    }

  </style>
</head>
<body>

  <div id="game-container">
    
    <!-- Heads Up Display -->
    <div id="hud">
      <div class="hud-panel">
        <span class="hud-label">Score</span>
        <span id="score" class="hud-score">0</span>
      </div>
      
      <!-- Legend for Good Emojis -->
      <div class="hud-panel" style="flex: 1; margin: 0 10px; align-items: center;">
        <span class="hud-label">Catch</span>
        <span id="good-emojis" class="hud-emojis"></span>
      </div>

      <!-- Legend for Bad Emojis -->
      <div class="hud-panel" style="flex: 1; margin: 0 10px; align-items: center;">
        <span class="hud-label">Avoid</span>
        <span id="bad-emojis" class="hud-emojis"></span>
      </div>

      <div class="hud-panel">
        <span class="hud-label">Lives</span>
        <span id="hearts"></span>
      </div>
    </div>

    <!-- The Game World -->
    <div id="play-area"></div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen-overlay">
      <h1>Emoji Catcher</h1>
      <p>Catch the <b style="color:#4caf50">Good Emojis</b> to score points.<br>Avoid the <b style="color:#e94560">Bad Emojis</b> or lose a life!</p>
      <button id="start-btn">Start Game</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen-overlay hidden">
      <h1>Game Over</h1>
      <p>Your Final Score: <span id="final-score" style="color: #4caf50; font-weight:bold;">0</span></p>
      <button id="restart-btn">Play Again</button>
    </div>

  </div>

  <script>
    // --- Configuration ---
    const GOOD_EMOJIS = ['🍎', '🍊', '🍇', '🍉', '🍓', '🍒', '🍑', '🍋', '🍌'];
    const BAD_EMOJIS = ['🔥', '💣', '💀', '👹', '👺', '👻', '☠️'];
    
    const MAX_LIVES = 3;
    const SPAWN_RATE_MS = 1000; // Initial spawn rate
    const INITIAL_SPEED = 3; // Pixels per frame

    // --- State Variables ---
    let score = 0;
    let lives = MAX_LIVES;
    let gameActive = false;
    let spawnIntervalId = null;
    let animationFrameId = null;
    let emojis = []; // Array to store active emoji objects { element, x, y, speed, type }
    let currentSpawnRate = SPAWN_RATE_MS;
    let currentSpeed = INITIAL_SPEED;

    // --- DOM Elements ---
    const playArea = document.getElementById('play-area');
    const scoreEl = document.getElementById('score');
    const heartsEl = document.getElementById('hearts');
    const goodEmojisEl = document.getElementById('good-emojis');
    const badEmojisEl = document.getElementById('bad-emojis');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreEl = document.getElementById('final-score');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');

    // --- Initialization ---
    function init() {
      // Reset State
      score = 0;
      lives = MAX_LIVES;
      emojis = [];
      gameActive = false;
      currentSpawnRate = SPAWN_RATE_MS;
      currentSpeed = INITIAL_SPEED;

      // Clear DOM
      playArea.innerHTML = '';
      
      // Update UI
      updateUI();
      
      // Show Start Screen
      startScreen.classList.remove('hidden');
      gameOverScreen.classList.add('hidden');
    }

    function startGame() {
      startScreen.classList.add('hidden');
      gameActive = true;
      
      // Start Loops
      spawnIntervalId = setInterval(spawnEmoji, currentSpawnRate);
      gameLoop();
    }

    function endGame() {
      gameActive = false;
      clearInterval(spawnIntervalId);
      cancelAnimationFrame(animationFrameId);
      
      finalScoreEl.textContent = score;
      gameOverScreen.classList.remove('hidden');
    }

    // --- Core Game Logic ---

    function updateUI() {
      scoreEl.textContent = score;
      
      // Update Lives (Hearts)
      heartsEl.innerHTML = '';
      for (let i = 0; i < MAX_LIVES; i++) {
        const heart = document.createElement('span');
        heart.textContent = i < lives ? '❤️' : '🖤';
        heartsEl.appendChild(heart);
      }

      // Update Legend Emojis (showing a sample of what to look for)
      goodEmojisEl.innerHTML = GOOD_EMOJIS.slice(0, 5).join(' '); 
      badEmojisEl.innerHTML = BAD_EMOJIS.slice(0, 5).join(' ');
    }

    function spawnEmoji() {
      if (!gameActive) return;

      // Create the element
      const el = document.createElement('div');
      el.classList.add('emoji');
      
      // Determine Type (Good or Bad)
      // 80% chance of good emoji
      const isGood = Math.random() < 0.8;
      const type = isGood ? 'good' : 'bad';
      
      const content = isGood 
        ? GOOD_EMOJIS[Math.floor(Math.random() * GOOD_EMOJIS.length)]
        : BAD_EMOJIS[Math.floor(Math.random() * BAD_EMOJIS.length)];

      el.textContent = content;
      el.dataset.type = type; // Store type in DOM for easy access

      // Random Position (X axis only, 10% to 90% width)
      const x = Math.floor(Math.random() * 80) + 10;
      const y = -50; // Start just above the screen

      el.style.left = `${x}%`;
      el.style.top = `${y}px`;

      // Click Event
      el.addEventListener('mousedown', () => handleEmojiClick(el, type));
      el.addEventListener('touchstart', () => handleEmojiClick(el, type)); // Mobile support

      playArea.appendChild(el);

      // Add to state array
      emojis.push({
        element: el,
        x: x,
        y: y,
        speed: currentSpeed + (Math.random() * 2) // Slight speed variance
      });
    }

    function handleEmojiClick(el, type) {
      if (!gameActive) return;

      // Find the object in our array to remove it
      const index = emojis.findIndex(e => e.element === el);
      if (index === -1) return; // Already processed

      const emojiObj = emojis[index];

      // Visual feedback
      el.classList.add('popped');

      // Remove from array
      emojis.splice(index, 1);

      // Logic
      if (type === 'good') {
        score += 10;
        // Increase difficulty slightly every 50 points
        if (score % 50 === 0) {
          currentSpeed += 0.5;
          // Decrease spawn time (make it faster)
          clearInterval(spawnIntervalId);
          currentSpawnRate = Math.max(200, currentSpawnRate - 50);
          spawnIntervalId = setInterval(spawnEmoji, currentSpawnRate);
        }
      } else {
        lives--;
        // Screen shake effect
        document.body.style.transform = "translateX(5px)";
        setTimeout(() => document.body.style.transform = "translateX(0)", 50);
      }

      updateUI();

      // Cleanup DOM after animation
      setTimeout(() => {
        if (el.parentNode) el.parentNode.removeChild(el);
      }, 200);

      if (lives <= 0) {
        endGame();
      }
    }

    function gameLoop() {
      if (!gameActive) return;

      // Move all emojis
      for (let i = 0; i < emojis.length; i++) {
        const obj = emojis[i];
        obj.y += obj.speed;
        obj.element.style.top = `${obj.y}px`;

        // Check if it hit the bottom
        const areaHeight = playArea.offsetHeight;
        if (obj.y > areaHeight) {
          // Remove from DOM
          if (obj.element.parentNode) obj.element.parentNode.removeChild(obj.element);
          
          // Remove from array (adjust index since length changed)
          emojis.splice(i, 1);
          i--; 
          
          // If a Good emoji falls off, you lose a life? 
          // Let's keep it simple: Only Bad emojis hurt you on touch. 
          // Good emojis just disappear (missed opportunity).
        }
      }

      animationFrameId = requestAnimationFrame(gameLoop);
    }

    // --- Event Listeners ---
    startBtn.addEventListener('click', startGame);
    
    restartBtn.addEventListener('click', init);
    
    // Start the app
    init();

  </script>
</body>
</html>
